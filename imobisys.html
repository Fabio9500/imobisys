<!DOCTYPE html>
<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ImobiSys — Controle de Imóveis</title>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--sur:#161b22;--card:#1c2433;--bor:#30363d;--acc:#4ade80;--grn:#2ea043;--red:#da3633;--blu:#58a6ff;--orn:#f0a500;--pur:#bc8cff;--txt:#e6edf3;--mut:#8b949e;--r:8px}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px}
input,select,textarea{background:var(--bg);color:var(--txt);border:1px solid var(--bor);border-radius:var(--r);padding:7px 10px;font-size:13px;outline:none;width:100%;transition:border-color .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
input::placeholder{color:var(--mut)}
input[type="date"],input[type="month"]{color-scheme:dark}
input[type="date"]::-webkit-calendar-picker-indicator,input[type="month"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:1;background-color:var(--acc);border-radius:4px;padding:3px}
button{cursor:pointer;font-weight:700;border:none;border-radius:var(--r);transition:opacity .15s;font-family:inherit}
button:hover{opacity:.85}
table{border-collapse:collapse;width:100%;font-size:12px}
th{text-align:left;padding:7px 10px;color:var(--txt);font-weight:800;border-bottom:2px solid var(--acc);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
td{padding:7px 10px;border-bottom:1px solid #1e2530;vertical-align:middle}
tr:hover td{background:#1e2a3a22}
.card{background:var(--card);border:1px solid var(--bor);border-radius:var(--r);padding:16px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.tag-am{background:#f0a50022;color:var(--orn);border:1px solid #f0a50055}
.tag-vd{background:#2ea04322;color:#3fb950;border:1px solid #2ea04355}
.tag-vm{background:#da363322;color:#f85149;border:1px solid #da363355}
.tag-az{background:#58a6ff22;color:var(--blu);border:1px solid #58a6ff55}
.tag-cz{background:#30363d33;color:var(--mut);border:1px solid var(--bor)}
.tag-vx{background:#4ade8022;color:var(--acc);border:1px solid #4ade8055}
.overlay{position:fixed;inset:0;background:#000a;z-index:999;display:none;align-items:center;justify-content:center;padding:12px}
.overlay.vis{display:flex}
.modal{background:var(--card);border:1px solid var(--bor);border-radius:12px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto}
.modal-head{padding:13px 16px;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;position:sticky;top:0;background:var(--card);z-index:2}
.modal-body{padding:16px}
.campo{margin-bottom:10px}
.campo label{display:block;font-size:10px;color:var(--mut);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
#navbar{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 16px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:800;color:var(--acc);white-space:nowrap}
.tabs{display:flex;gap:3px;overflow-x:auto;flex:1;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{background:transparent;color:var(--mut);border:none;border-radius:6px;padding:5px 11px;font-size:11px;font-weight:700;white-space:nowrap;cursor:pointer}
.tab.ativo{background:var(--acc);color:#000}
#main{padding:18px;max-width:1300px;margin:0 auto}
.titulo{font-weight:800;font-size:17px;margin-bottom:14px}
.titulo.acc{color:var(--acc)}
.kpis{display:flex;gap:10px;flex-wrap:wrap;margin-bottom:14px}
.kpi{flex:1 1 150px;min-width:140px}
.kpi-l{font-size:10px;color:var(--mut);text-transform:uppercase;margin-bottom:5px;letter-spacing:.07em}
.kpi-v{font-size:20px;font-weight:800}
.kpi-s{font-size:11px;color:var(--mut);margin-top:2px}
.alerta{border-radius:8px;padding:9px 14px;margin-bottom:8px;font-size:12px;line-height:1.5}
.av{background:#da363322;border:1px solid var(--red);color:#f85149}
.aa{background:#f0a50022;border:1px solid var(--orn);color:var(--orn)}
.ai{background:#58a6ff22;border:1px solid var(--blu);color:var(--blu)}
.ag{background:#4ade8022;border:1px solid var(--acc);color:var(--acc)}
#status{position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:20px;font-size:12px;font-weight:700;display:none;z-index:500;white-space:nowrap}
#tela-loading{position:fixed;inset:0;background:var(--bg);z-index:9999;display:flex;flex-direction:column;align-items:center;justify-content:center;gap:16px}
.spin{width:40px;height:40px;border:3px solid var(--bor);border-top-color:var(--acc);border-radius:50%;animation:sp .8s linear infinite}
@keyframes sp{to{transform:rotate(360deg)}}
#tela-token{position:fixed;inset:0;background:var(--bg);z-index:9998;display:none;align-items:center;justify-content:center;padding:20px}
#fab-buttons{position:fixed;bottom:70px;right:16px;display:flex;flex-direction:column;gap:10px;z-index:300}
.fab{width:48px;height:48px;border-radius:50%;border:none;cursor:pointer;font-size:20px;display:flex;align-items:center;justify-content:center;box-shadow:0 4px 12px #0006;transition:transform .15s,opacity .15s;font-family:inherit;position:relative}
.fab:hover{transform:scale(1.1)}
.fab-main{background:var(--acc);color:#000}
.fab-wpp{background:#25d366;color:#fff}
.fab-back{background:var(--sur);color:var(--txt);border:1px solid var(--bor)}
.fab-tip{position:absolute;right:58px;background:#111;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;top:50%;transform:translateY(-50%)}
.fab:hover .fab-tip{opacity:1}
@media print{#navbar,.noprint,#status,#fab-buttons{display:none!important}#main{padding:0;max-width:none}}
</style>
</head>
<body>

<div id="tela-loading">
  <div style="font-size:36px">🏠</div>
  <div style="font-weight:800;font-size:22px;color:var(--acc)">ImobiSys</div>
  <div class="spin"></div>
  <div style="color:var(--mut);font-size:13px" id="load-msg">Carregando...</div>
</div>

<div id="tela-token">
  <div class="card" style="max-width:480px;width:100%;padding:32px;text-align:center">
    <div style="font-size:44px;margin-bottom:12px">🏠</div>
    <div style="font-weight:800;font-size:22px;color:var(--acc);margin-bottom:8px">ImobiSys</div>
    <p style="color:var(--mut);font-size:13px;margin-bottom:24px;line-height:1.7">Controle de Imóveis &amp; Aluguéis<br>Informe seu <strong style="color:var(--txt)">Token do GitHub</strong> para conectar.</p>
    <div class="campo" style="text-align:left;margin-bottom:16px">
      <label>Token do GitHub</label>
      <input id="inp-token" type="password" placeholder="github_pat_..." onkeydown="if(event.key==='Enter')entrar()"/>
    </div>
    <button type="button" onclick="entrar()" style="background:var(--acc);color:#000;padding:11px 28px;font-size:14px;font-weight:800;border:none;border-radius:var(--r);cursor:pointer;width:100%;margin-bottom:10px">✅ Conectar e Entrar</button>
    <div id="err-token" style="color:var(--red);font-size:12px;display:none">Token inválido ou sem conexão. Verifique e tente novamente.</div>
  </div>
</div>

<div id="navbar" style="display:none">
  <div class="logo">🏠 ImobiSys</div>
  <div class="tabs" id="tabs"></div>
  <button type="button" onclick="desconectar()" style="background:transparent;color:var(--mut);font-size:11px;padding:4px 8px;border:1px solid var(--bor);" title="Trocar token">⚙</button>
</div>
<div id="main" style="display:none"></div>
<div id="status"></div>

<div class="overlay" id="ov">
  <div class="modal">
    <div class="modal-head"><span id="m-titulo"></span>
      <button type="button" onclick="FM()" style="background:var(--bor);color:var(--txt);padding:3px 9px;font-size:11px">✕</button>
    </div>
    <div class="modal-body" id="m-corpo"></div>
  </div>
</div>

<div class="overlay" id="ov-cf">
  <div class="card" style="max-width:400px;width:100%;text-align:center;padding:24px">
    <div style="font-size:14px;font-weight:700;margin-bottom:20px;line-height:1.6" id="cf-msg"></div>
    <div class="row" style="justify-content:center;gap:10px">
      <button type="button" id="cf-sim" style="background:var(--red);color:#fff;padding:8px 20px">Confirmar</button>
      <button type="button" onclick="FCF()" style="background:var(--sur);color:var(--txt);padding:8px 20px;border:1px solid var(--bor)">Cancelar</button>
    </div>
  </div>
</div>

<div id="fab-buttons" style="display:none">
  <div class="fab fab-main" onclick="acaoRapida()" id="fab-add"><span class="fab-tip">Adicionar</span>➕</div>
  <div class="fab fab-wpp" onclick="abrirWppAtrasados()" id="fab-wpp" style="display:none"><span class="fab-tip">WhatsApp inadimplentes</span>💬</div>
  <div class="fab fab-back" onclick="voltarPagina()" id="fab-back"><span class="fab-tip">Voltar</span>←</div>
</div>

<script>
// ══════════════════════════════════════════
// CONFIG GITHUB
// ══════════════════════════════════════════
const GH_USER='Fabio9500', GH_REPO='imobisys', GH_FILE='dados.json';
const GH_API=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
const AK='imobisys';
function getToken(){ return localStorage.getItem(AK+'_token')||''; }
function setToken(t){ localStorage.setItem(AK+'_token',t); }
let _sha=null, _shaAtual=null, _intervaloSync=null;
let DB={};

// ══════════════════════════════════════════
// OFFLINE / FILA
// ══════════════════════════════════════════
function getFila(){ try{return JSON.parse(localStorage.getItem(AK+'_fila')||'null');}catch(e){return null;} }
function setFila(db){ try{localStorage.setItem(AK+'_fila',JSON.stringify(db));}catch(e){} }
function limparFila(){ localStorage.removeItem(AK+'_fila'); }
function getUltimoSha(){ return localStorage.getItem(AK+'_last_sha')||''; }
function setUltimoSha(s){ if(s)localStorage.setItem(AK+'_last_sha',s); }
let _sincronizando=false;
function isOnline(){ return navigator.onLine; }

async function ghCarregar(){
  try{
    setStatus('saving','🔄 Carregando...');
    const r=await fetch(GH_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===401||r.status===403) return null;
    if(r.status===404){ setStatus('ok','✅ Pronto'); return dbVazio(); }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    _sha=j.sha; setUltimoSha(j.sha); _shaAtual=j.sha;
    let dados;
    if(!j.content||j.content.trim()===''){
      const r2=await fetch(j.download_url); if(!r2.ok) throw new Error('Download falhou'); dados=await r2.json();
    } else { dados=JSON.parse(atob(j.content.replace(/\n/g,''))); }
    try{localStorage.setItem(AK+'_bkp',JSON.stringify(dados));}catch(e){}
    const fila=getFila();
    if(fila){ setStatus('warn','📤 Sincronizando alterações offline...'); return await resolverFila(fila,dados,j.sha); }
    setStatus('ok','✅ Dados carregados');
    setTimeout(()=>esconderStatus(),3000);
    return dados;
  }catch(e){
    const bkp=localStorage.getItem(AK+'_bkp');
    if(bkp){ setStatus('warn','📴 Offline — usando dados locais'); return JSON.parse(bkp); }
    setStatus('warn','⚠ Sem dados'); return dbVazio();
  }
}

async function resolverFila(filaDb,dadosRemotos,shaRemoto){
  const shaOld=getUltimoSha();
  if(!shaOld||shaOld===shaRemoto){
    limparFila(); await ghSalvar(filaDb);
    setStatus('ok','✅ Alterações offline sincronizadas');
    setTimeout(()=>esconderStatus(),4000);
    return filaDb;
  }
  mostrarConflitoSync(filaDb,dadosRemotos); return dadosRemotos;
}

function mostrarConflitoSync(filaDb,dadosRemotos){
  AM('⚠️ Conflito de Sincronização',`
    <div class="alerta av" style="margin-bottom:14px;font-size:13px">Você tem alterações offline que ainda não foram salvas na nuvem.<br>Porém, outro dispositivo já salvou dados diferentes. Escolha como prosseguir:</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${B('☁️ Manter dados da nuvem (descarta alterações offline)','aplicarConflito(&quot;nuvem&quot;)','var(--blu)','#fff')}
      ${B('💾 Usar minhas alterações offline (sobrescreve nuvem)','aplicarConflito(&quot;local&quot;)','var(--acc)','#000')}
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--mut)">Dica: em dúvida escolha "nuvem" e refaça as alterações manualmente.</div>
  `);
  window._cFilaDb=filaDb; window._cRemoto=dadosRemotos;
}

async function aplicarConflito(op){
  FM();
  if(op==='nuvem'){ limparFila(); DB=window._cRemoto; setStatus('ok','☁️ Dados da nuvem mantidos'); }
  else { limparFila(); await ghSalvar(window._cFilaDb); DB=window._cFilaDb; setStatus('ok','✅ Alterações offline salvas'); }
  delete window._cFilaDb; delete window._cRemoto;
  renderAba(); setTimeout(()=>esconderStatus(),4000);
}

async function ghSalvar(db){
  try{localStorage.setItem(AK+'_bkp',JSON.stringify(db));}catch(e){}
  if(!isOnline()){ setFila(db); setStatus('warn','📴 Offline — alteração salva localmente'); setTimeout(()=>esconderStatus(),4000); return; }
  setStatus('saving','⏳ Salvando...');
  try{
    const rG=await fetch(GH_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
    if(rG.ok){ const jG=await rG.json(); _sha=jG.sha; _shaAtual=jG.sha; }
    const cont=btoa(unescape(encodeURIComponent(JSON.stringify(db,null,2))));
    const r=await fetch(GH_API,{method:'PUT',headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'ImobiSys update',content:cont,sha:_sha})});
    const res=await r.json();
    if(res.content&&res.content.sha){ _sha=res.content.sha; _shaAtual=res.content.sha; setUltimoSha(res.content.sha); limparFila(); setStatus('ok','✅ Salvo'); }
    else { setFila(db); setStatus('err','⚠ Erro ao salvar — guardado localmente'); }
    setTimeout(()=>esconderStatus(),3000);
  }catch(e){ setFila(db); setStatus('warn','📴 Sem conexão — salvo localmente'); setTimeout(()=>esconderStatus(),5000); }
}

window.addEventListener('online',async()=>{
  const fila=getFila();
  if(fila&&!_sincronizando){
    _sincronizando=true;
    try{
      const r=await fetch(GH_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
      if(r.ok){ const j=await r.json(); const dr=JSON.parse(atob(j.content.replace(/\n/g,''))); await resolverFila(fila,dr,j.sha); if(!window._cFilaDb)renderAba(); }
    }catch(e){}
    _sincronizando=false;
  }
});
window.addEventListener('offline',()=>{ setStatus('warn','📴 Você está offline'); setTimeout(()=>esconderStatus(),4000); });

function esconderStatus(){ document.getElementById('status').style.display='none'; }
function setStatus(tipo,msg){
  const el=document.getElementById('status');
  const s={saving:'background:#f0a50022;color:var(--orn);border:1px solid #f0a50055',ok:'background:#2ea04322;color:#3fb950;border:1px solid #2ea04355',warn:'background:#f0a50022;color:var(--orn);border:1px solid #f0a50055',err:'background:#da363322;color:#f85149;border:1px solid #da363355'};
  el.style.cssText='display:block;position:fixed;bottom:16px;left:50%;transform:translateX(-50%);padding:8px 20px;border-radius:20px;font-size:12px;font-weight:700;z-index:500;white-space:nowrap;'+s[tipo];
  el.textContent=msg;
}

function atualizarIndicador(){
  let ind=document.getElementById('conn-ind');
  if(!ind){ ind=document.createElement('div'); ind.id='conn-ind'; ind.style.cssText='position:fixed;top:55px;right:12px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;z-index:250;display:none'; document.body.appendChild(ind); }
  const fila=getFila();
  if(!isOnline()){ ind.style.cssText='position:fixed;top:55px;right:12px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;z-index:250;display:block;background:#da363322;color:#f85149;border:1px solid #da363355'; ind.textContent='📴 Offline'; }
  else if(fila){ ind.style.cssText='position:fixed;top:55px;right:12px;font-size:10px;font-weight:700;padding:3px 9px;border-radius:10px;z-index:250;display:block;background:#f0a50022;color:var(--orn);border:1px solid #f0a50055'; ind.textContent='🔄 Pendente'; }
  else { ind.style.display='none'; }
}
setInterval(atualizarIndicador,2000);

// ══════════════════════════════════════════
// SYNC AUTOMÁTICA 30s
// ══════════════════════════════════════════
async function verificarSyncRemota(){
  if(!isOnline()||!getToken()) return;
  try{
    const r=await fetch(GH_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) return;
    const j=await r.json();
    if(_shaAtual&&j.sha!==_shaAtual){
      _shaAtual=j.sha; _sha=j.sha; setUltimoSha(j.sha);
      let dados; if(!j.content||j.content.trim()===''){ const r2=await fetch(j.download_url); dados=await r2.json(); } else { dados=JSON.parse(atob(j.content.replace(/\n/g,''))); }
      DB=dados; try{localStorage.setItem(AK+'_bkp',JSON.stringify(dados));}catch(e){}
      renderAba(); setStatus('ok','🔄 Atualizado de outro dispositivo'); setTimeout(()=>esconderStatus(),4000);
    }
  }catch(e){}
}
function iniciarSync(){ if(_intervaloSync)clearInterval(_intervaloSync); _intervaloSync=setInterval(verificarSyncRemota,30000); }

// ══════════════════════════════════════════
// BACKUP
// ══════════════════════════════════════════
async function backupGH(silencioso){
  if(!getToken()||!isOnline()) return false;
  try{
    const ts=new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
    const url=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/backups/backup_${ts}.json`;
    const cont=btoa(unescape(encodeURIComponent(JSON.stringify(DB,null,2))));
    const r=await fetch(url,{method:'PUT',headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:`Backup ${ts}`,content:cont})});
    if(r.ok){ try{localStorage.setItem(AK+'_ult_bkp',new Date().toLocaleString('pt-BR'));}catch(e){} if(!silencioso){setStatus('ok','☁️ Backup salvo no GitHub!');setTimeout(()=>esconderStatus(),4000);} return true; }
  }catch(e){}
  if(!silencioso){setStatus('err','⚠ Erro ao fazer backup');setTimeout(()=>esconderStatus(),4000);}
  return false;
}
function backupLocal(){
  const ts=new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
  const nome=`ImobiSys_backup_${ts}.json`;
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=nome; a.click();
  URL.revokeObjectURL(a.href);
  try{localStorage.setItem(AK+'_ult_bkp',new Date().toLocaleString('pt-BR'));}catch(e){}
  setStatus('ok',`💾 ${nome}`); setTimeout(()=>esconderStatus(),4000);
}
async function backupCompleto(){
  setStatus('saving','⏳ Fazendo backup completo...');
  const ghOk=await backupGH(true); backupLocal();
  setStatus(ghOk?'ok':'warn',ghOk?'✅ Backup concluído — GitHub + local':'💾 Backup local (GitHub indisponível)');
  setTimeout(()=>esconderStatus(),5000);
}
function importarBackup(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.imoveis||!d.inquilinos){alert('Arquivo inválido.');return;}
      ACF('Importar backup substituirá todos os dados atuais. Confirmar?',async()=>{ DB=d; await ghSalvar(DB); renderAba(); setStatus('ok','✅ Backup importado'); });
    }catch(e){alert('Erro ao ler arquivo: '+e.message);}
  };
  reader.readAsText(file);
}
function abrirModalBackup(){
  let ult=''; try{ult=localStorage.getItem(AK+'_ult_bkp')||'';}catch(e){}
  AM('💾 Backup dos Dados',`
    <div style="font-size:12px;color:var(--mut);margin-bottom:14px">${ult?'Último backup: <strong style="color:var(--txt)">'+ult+'</strong>':'Nenhum backup registrado.'}</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${B('☁️ + 💾 Backup Completo (GitHub + local)','backupCompleto()','var(--acc)','#000')}
      ${B('☁️ Somente GitHub','backupGH(false)','var(--blu)','#fff')}
      ${B('💾 Somente arquivo local','backupLocal()','var(--sur)','var(--txt)')}
      <div style="margin-top:6px;border-top:1px solid var(--bor);padding-top:12px">
        <label style="font-size:11px;color:var(--mut);font-weight:700;text-transform:uppercase;display:block;margin-bottom:6px">Importar Backup</label>
        <input type="file" accept=".json" onchange="importarBackup(this.files[0])" style="font-size:12px;padding:6px"/>
      </div>
    </div>

// UTILITÁRIOS
// ══════════════════════════════════════════
function uid(){ return Date.now().toString(36)+Math.random().toString(36).slice(2,7); }
function esc(s){ return String(s||'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;'); }
function fmt(n){ return 'R$ '+parseFloat(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtN(n){ return parseFloat(n||0).toLocaleString('pt-BR',{minimumFractionDigits:2,maximumFractionDigits:2}); }
function fmtData(d){ if(!d) return '—'; const [a,m,dd]=d.split('-'); return `${dd}/${m}/${a}`; }
function fmtMes(ref){ if(!ref) return '—'; const [a,m]=ref.split('-'); return ['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][parseInt(m)-1]+'/'+a; }
function hoje(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }
function mesAtual(){ const d=new Date(); return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`; }
function diasAtraso(v){ if(!v) return 0; const d=new Date(v+'T00:00:00'); const h=new Date(); h.setHours(0,0,0,0); return Math.floor((h-d)/(86400000)); }
function stPag(p){ if(p.status==='pago') return 'pago'; return diasAtraso(p.vencimento)>0?'atrasado':'pendente'; }
function stDesp(d){ if(d.status==='pago') return 'pago'; return diasAtraso(d.vencimento)>0?'atrasado':'pendente'; }
function corSt(s){ return {pago:'tag-vd',pendente:'tag-az',atrasado:'tag-vm',vago:'tag-am',alugado:'tag-vx',reforma:'tag-cz',ativo:'tag-vx',encerrado:'tag-cz',rescindido:'tag-vm'}[s]||'tag-cz'; }
function lblSt(s){ return {pago:'✓ Pago',pendente:'⏳ Pendente',atrasado:'⚠ Atrasado',vago:'🔓 Vago',alugado:'✅ Alugado',reforma:'🔨 Reforma',ativo:'✅ Ativo',encerrado:'📁 Encerrado',rescindido:'❌ Rescindido'}[s]||s; }
function nomeIm(id){ const i=DB.imoveis.find(x=>x.id===id); return i?i.nome:'?'; }
function nomeIq(id){ const i=DB.inquilinos.find(x=>x.id===id); return i?i.nome:'?'; }
function nomeCt(id){ const c=DB.contas.find(x=>x.id===id); return c?c.nome:''; }
function ctAtivo(imovelId){ return DB.contratos.find(c=>c.imovelId===imovelId&&c.status==='ativo')||null; }
function ctAtivoIq(iqId){ return DB.contratos.find(c=>c.inquilinoId===iqId&&c.status==='ativo')||null; }
function B(lbl,oc,bg,cor,extra){ bg=bg||'var(--acc)'; cor=cor||'#000'; return `<button type="button" onclick="${oc}" style="background:${bg};color:${cor};padding:7px 14px;font-size:12px;border:none;border-radius:var(--r);cursor:pointer;font-weight:700;font-family:inherit;${extra||''}">${lbl}</button>`; }
function AM(titulo,html){ document.getElementById('m-titulo').innerHTML=titulo; document.getElementById('m-corpo').innerHTML=html; document.getElementById('ov').classList.add('vis'); }
function FM(){ document.getElementById('ov').classList.remove('vis'); }
let _cfCb=null;
function ACF(msg,cb,btxt){ document.getElementById('cf-msg').innerHTML=msg; document.getElementById('ov-cf').classList.add('vis'); _cfCb=cb; const b=document.getElementById('cf-sim'); b.textContent=btxt||'Confirmar'; const novo=b.cloneNode(true); b.parentNode.replaceChild(novo,b); novo.addEventListener('click',()=>{FCF();if(_cfCb)_cfCb();}); }
function FCF(){ document.getElementById('ov-cf').classList.remove('vis'); _cfCb=null; }

function calcAtrasados(){ return DB.pagamentos.filter(p=>p.status!=='pago'&&diasAtraso(p.vencimento)>0); }
function calcDespAtrasadas(){ return DB.despesas.filter(d=>d.status!=='pago'&&diasAtraso(d.vencimento)>0); }
function receitaMes(m){ const r=m||mesAtual(); const pp=DB.pagamentos.filter(p=>p.referencia===r); return {esp:pp.reduce((s,p)=>s+(p.valorPrevisto||0),0), rec:pp.filter(p=>p.status==='pago').reduce((s,p)=>s+(p.valorPago||p.valorPrevisto||0),0)}; }

function abrirWpp(telefone,msg){ const t=telefone.replace(/\D/g,''); window.open(`https://wa.me/${t.startsWith('55')?t:'55'+t}?text=${encodeURIComponent(msg)}`,'_blank'); }

function wppMsgAtraso(inq,im,pags){
  const lista=pags.map(p=>`• Ref. ${fmtMes(p.referencia)} — Venc. ${fmtData(p.vencimento)} — ${fmt(p.valorPrevisto)} (${diasAtraso(p.vencimento)} dia(s))`).join('\n');
  const total=pags.reduce((s,p)=>s+(p.valorPrevisto||0),0);
  return `Olá ${inq.nome}! 😊\n\nPassando para informar sobre aluguel(is) em atraso do imóvel *${im.nome}*.\n\n${lista}\n\n*Total em aberto: ${fmt(total)}*\n\nPor favor, entre em contato para regularizarmos.\n\nAtenciosamente,\nFabio Santos`;
}

function abrirWppInquilino(iqId){
  const inq=DB.inquilinos.find(x=>x.id===iqId);
  if(!inq||!inq.whatsapp){alert('Inquilino sem WhatsApp cadastrado.');return;}
  const ct=ctAtivoIq(iqId);
  const im=ct?DB.imoveis.find(x=>x.id===ct.imovelId):null;
  const pags=DB.pagamentos.filter(p=>p.inquilinoId===iqId&&p.status!=='pago'&&diasAtraso(p.vencimento)>0);
  const msg=pags.length>0&&im?wppMsgAtraso(inq,im,pags):`Olá ${inq.nome}! 😊\n\nEntrando em contato referente ao aluguel.\n\nAtenciosamente,\nFabio Santos`;
  abrirWpp(inq.whatsapp,msg);
}

function abrirWppPag(pagId){
  const pag=DB.pagamentos.find(x=>x.id===pagId);
  if(!pag) return;
  const inq=DB.inquilinos.find(x=>x.id===pag.inquilinoId);
  if(!inq||!inq.whatsapp){alert('Inquilino sem WhatsApp cadastrado.');return;}
  const im=DB.imoveis.find(x=>x.id===pag.imovelId);
  const da=diasAtraso(pag.vencimento);
  const msg=`Olá ${inq.nome}! 😊\n\nReferente ao aluguel do imóvel *${im?im.nome:''}*:\n\n📅 Referência: ${fmtMes(pag.referencia)}\n📅 Vencimento: ${fmtData(pag.vencimento)}\n💰 Valor: ${fmt(pag.valorPrevisto)}${da>0?'\n⚠ '+da+' dia(s) em atraso':''}\n\nPor favor, entre em contato para regularizarmos.\n\nAtenciosamente,\nFabio Santos`;
  abrirWpp(inq.whatsapp,msg);
}

function abrirWppAtrasados(){
  const atr=calcAtrasados();
  if(atr.length===0){setStatus('ok','✅ Nenhum aluguel em atraso!');setTimeout(()=>esconderStatus(),3000);return;}
  const porIq={};
  atr.forEach(p=>{if(!porIq[p.inquilinoId])porIq[p.inquilinoId]=[];porIq[p.inquilinoId].push(p);});
  const lista=Object.entries(porIq);
  let html=`<div style="font-size:13px;margin-bottom:14px">Há <strong>${atr.length}</strong> parcela(s) em atraso de <strong>${lista.length}</strong> inquilino(s):</div>`;
  lista.forEach(([iqId,pags])=>{
    const inq=DB.inquilinos.find(x=>x.id===iqId);
    if(!inq) return;
    const im=pags[0]?DB.imoveis.find(x=>x.id===pags[0].imovelId):null;
    const total=pags.reduce((s,p)=>s+(p.valorPrevisto||0),0);
    html+=`<div style="display:flex;align-items:center;gap:10px;padding:10px;background:var(--bg);border:1px solid var(--bor);border-radius:8px;margin-bottom:8px">
      <div style="flex:1"><div style="font-weight:700">${esc(inq.nome)}</div>
      <div style="font-size:11px;color:var(--mut)">${im?esc(im.nome):''} — ${pags.length} parcela(s) — ${fmt(total)}</div>
      <div style="font-size:11px;color:${inq.whatsapp?'var(--acc)':'var(--red)'}">📱 ${esc(inq.whatsapp||'Sem WhatsApp')}</div></div>
      ${inq.whatsapp?B('💬 Enviar',`FM();abrirWppInquilino('${inq.id}')`, '#25d366','#fff'):''}
    </div>`;
  });
  AM('💬 WhatsApp — Inadimplentes',html);
}

function htmlDB(){
  const total=DB.imoveis.length, alugados=DB.imoveis.filter(i=>i.status==='alugado').length, vagos=DB.imoveis.filter(i=>i.status==='vago').length;
  const {esp,rec}=receitaMes(); const atr=calcAtrasados(); const datr=calcDespAtrasadas();
  const totalAtr=atr.reduce((s,p)=>s+(p.valorPrevisto||0),0);

  // Alertas de aluguéis atrasados agrupados por inquilino
  let alertas='';
  if(atr.length>0){
    const porIq={};
    atr.forEach(p=>{if(!porIq[p.inquilinoId])porIq[p.inquilinoId]=[];porIq[p.inquilinoId].push(p);});
    Object.entries(porIq).forEach(([iqId,pags])=>{
      const inq=DB.inquilinos.find(x=>x.id===iqId); const im=DB.imoveis.find(x=>x.id===pags[0].imovelId);
      const tot=pags.reduce((s,p)=>s+(p.valorPrevisto||0),0); const mx=Math.max(...pags.map(p=>diasAtraso(p.vencimento)));
      alertas+=`<div class="alerta av" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="flex:1">⚠ <strong>${esc(inq?inq.nome:'?')}</strong>${im?' — '+esc(im.nome):''} — ${pags.length} parcela(s) — ${fmt(tot)} — ${mx} dia(s)</div>
        ${inq&&inq.whatsapp?B('💬 WhatsApp',`abrirWppInquilino('${iqId}')`, '#25d366','#fff','padding:5px 10px;font-size:11px'):''}
      </div>`;
    });
  }

  // Despesas vencendo em até 7 dias
  const h7=new Date(); h7.setDate(h7.getDate()+7);
  DB.despesas.filter(d=>d.status!=='pago'&&diasAtraso(d.vencimento)<=0&&new Date(d.vencimento+'T00:00:00')<=h7).forEach(d=>{
    const im=DB.imoveis.find(x=>x.id===d.imovelId); const da=diasAtraso(d.vencimento);
    alertas+=`<div class="alerta aa">📅 Despesa vencendo: <strong>${esc(d.tipo.toUpperCase())}</strong> — ${im?esc(im.nome):''} — ${fmt(d.valor)} — Venc. ${fmtData(d.vencimento)}${da<0?' (em '+(da*-1)+' dias)':' (HOJE)'}</div>`;
  });
  if(datr.length>0) alertas+=`<div class="alerta av">⚠ ${datr.length} despesa(s) em atraso — total ${fmt(datr.reduce((s,d)=>s+(d.valor||0),0))}</div>`;

  // Contratos vencendo em 60 dias
  const h60=new Date(); h60.setDate(h60.getDate()+60); const h0=new Date(); h0.setHours(0,0,0,0);
  DB.contratos.filter(c=>c.status==='ativo'&&c.dataFim).forEach(c=>{
    const fim=new Date(c.dataFim+'T00:00:00');
    if(fim>=h0&&fim<=h60){
      const im=DB.imoveis.find(x=>x.id===c.imovelId); const inq=DB.inquilinos.find(x=>x.id===c.inquilinoId);
      const dias=Math.ceil((fim-h0)/86400000);
      alertas+=`<div class="alerta aa">📋 Contrato vencendo em <strong>${dias} dias</strong>: ${im?esc(im.nome):''} — ${inq?esc(inq.nome):''} — Fim: ${fmtData(c.dataFim)}</div>`;
    }
  });
  if(!alertas) alertas='<div class="alerta ag">✅ Tudo em dia — nenhum alerta no momento!</div>';

  const ultPags=[...DB.pagamentos].sort((a,b)=>(b.dataPagamento||b.vencimento)<(a.dataPagamento||a.vencimento)?-1:1).slice(0,6);

  return `<div class="titulo acc">📊 Dashboard</div>
  <div class="kpis">
    <div class="card kpi"><div class="kpi-l">Total de Imóveis</div><div class="kpi-v">${total}</div><div class="kpi-s">${alugados} alugado${alugados!==1?'s':''}, ${vagos} vago${vagos!==1?'s':''}</div></div>
    <div class="card kpi"><div class="kpi-l">Receita Esperada (mês)</div><div class="kpi-v" style="color:var(--acc)">${fmt(esp)}</div><div class="kpi-s">${fmtMes(mesAtual())}</div></div>
    <div class="card kpi"><div class="kpi-l">Recebido no Mês</div><div class="kpi-v" style="color:#3fb950">${fmt(rec)}</div><div class="kpi-s">${fmt(esp-rec)} pendente</div></div>
    <div class="card kpi"><div class="kpi-l">Total em Atraso</div><div class="kpi-v" style="color:${totalAtr>0?'#f85149':'var(--mut)'}">${fmt(totalAtr)}</div><div class="kpi-s">${atr.length} parcela(s)</div></div>
    <div class="card kpi"><div class="kpi-l">Contratos Ativos</div><div class="kpi-v">${DB.contratos.filter(c=>c.status==='ativo').length}</div><div class="kpi-s">de ${DB.contratos.length} total</div></div>
  </div>
  <div style="margin-bottom:16px"><div style="font-weight:700;margin-bottom:10px">🔔 Alertas</div>${alertas}</div>
  <div class="row" style="gap:16px;align-items:flex-start">
    <div style="flex:1;min-width:260px"><div class="card">
      <div style="font-weight:700;margin-bottom:12px;font-size:13px">🏠 Situação dos Imóveis</div>
      ${DB.imoveis.length===0?'<div style="color:var(--mut);font-size:12px">Nenhum imóvel cadastrado.</div>':''}
      ${DB.imoveis.map(im=>{const ct=ctAtivo(im.id);const inq=ct?DB.inquilinos.find(x=>x.id===ct.inquilinoId):null;return `<div style="padding:8px 0;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:8px"><div style="flex:1"><div style="font-weight:700;font-size:12px">${esc(im.nome)}</div><div style="font-size:11px;color:var(--mut)">${inq?esc(inq.nome):'Sem inquilino'}${ct?' — '+fmt(ct.valorAluguel)+'/mês':''}</div></div><span class="tag ${corSt(im.status)}">${lblSt(im.status)}</span></div>`;}).join('')}
    </div></div>
    <div style="flex:1;min-width:260px"><div class="card">
      <div style="font-weight:700;margin-bottom:12px;font-size:13px">💰 Últimos Lançamentos</div>
      ${ultPags.length===0?'<div style="color:var(--mut);font-size:12px">Nenhum pagamento registrado.</div>':''}
      ${ultPags.map(p=>{const im=DB.imoveis.find(x=>x.id===p.imovelId);const st=stPag(p);return `<div style="padding:8px 0;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:8px"><div style="flex:1"><div style="font-weight:700;font-size:12px">${im?esc(im.nome):'?'} — ${fmtMes(p.referencia)}</div><div style="font-size:11px;color:var(--mut)">${fmt(p.valorPrevisto)} — Venc. ${fmtData(p.vencimento)}</div></div><span class="tag ${corSt(st)}">${lblSt(st)}</span></div>`;}).join('')}
    </div></div>
  </div>`;
}

    <div class="row" style="margin-top:14px;justify-content:flex-end">${B('Cancelar','FM()','var(--sur)','var(--txt)')}${B('📅 Gerar',`execGerarCobrancas('${ctId}')`, 'var(--acc)','#000')}</div>
  `);
}
function execGerarCobrancas(ctId){
  const ct=DB.contratos.find(x=>x.id===ctId); if(!ct)return;
  const mesBase=document.getElementById('gc-mes').value;
  const qtd=parseInt(document.getElementById('gc-qtd').value)||1;
  const valCust=parseFloat(document.getElementById('gc-val').value)||0;
  const val=valCust||ct.valorAluguel;
  const novo=JSON.parse(JSON.stringify(DB));
  let gerados=0, ignorados=0;
  for(let i=0;i<qtd;i++){
    const [a,m]=mesBase.split('-').map(Number);
    const d=new Date(a,m-1+i,1);
    const ref=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(novo.pagamentos.some(p=>p.contratoId===ctId&&p.referencia===ref)){ignorados++;continue;}
    const dia=String(ct.diaVencimento).padStart(2,'0');
    const venc=`${ref}-${dia}`;
    novo.pagamentos.push({id:uid(),contratoId:ctId,imovelId:ct.imovelId,inquilinoId:ct.inquilinoId,referencia:ref,vencimento:venc,valorPrevisto:val,valorPago:0,dataPagamento:'',contaId:ct.contaId,status:'pendente',obs:''});
    gerados++;
  }
  FM(); salvar(novo);
  setStatus('ok',`✅ ${gerados} cobrança(s) gerada(s)${ignorados>0?`, ${ignorados} já existia(m)`:''}`);
  setTimeout(()=>esconderStatus(),4000);
}
function verPagsCt(ctId){
  const pags=DB.pagamentos.filter(p=>p.contratoId===ctId).sort((a,b)=>a.referencia>b.referencia?1:-1);
  const ct=DB.contratos.find(x=>x.id===ctId); const im=DB.imoveis.find(x=>x.id===ct?.imovelId);

  `);

function execGerarMes(){
  const mesBase=document.getElementById('gm-mes').value; if(!mesBase){alert('Selecione o mês.');return;}
  const [ano,mes]=mesBase.split('-'); const cts=DB.contratos.filter(c=>c.status==='ativo');
  const n=JSON.parse(JSON.stringify(DB)); let gerados=0, ignorados=0;
  cts.forEach(ct=>{
    if(n.pagamentos.some(p=>p.contratoId===ct.id&&p.referencia===mesBase)){ignorados++;return;}
    n.pagamentos.push({id:uid(),contratoId:ct.id,imovelId:ct.imovelId,inquilinoId:ct.inquilinoId,referencia:mesBase,vencimento:`${ano}-${mes}-${String(ct.diaVencimento).padStart(2,'0')}`,valorPrevisto:ct.valorAluguel,valorPago:0,dataPagamento:'',contaId:ct.contaId,status:'pendente',obs:''});
    gerados++;
  });
  FM(); salvar(n);
  setStatus('ok',`✅ ${gerados} cobrança(s) gerada(s)${ignorados>0?`, ${ignorados} já existia(m)`:''}`);
  setTimeout(()=>esconderStatus(),4000);
}

    <div class="row"><div style="flex:1" class="campo"><label>Valor (R$) *</label><input id="dp-val" type="number" step="0.01" value="${v('valor','0')}"/></div><div style="flex:1" class="campo"><label>Vencimento *</label><input id="dp-venc" type="date" value="${v('vencimento',hoje())}"/></div></div>
    <div class="row"><div style="flex:1" class="campo"><label>Conta (pagamento)</label><select id="dp-cta"><option value="">Selecione...</option>${DB.contas.map(c=>`<option value="${c.id}"${v('contaId')===c.id?' selected':''}>${esc(c.nome)}</option>`).join('')}</select></div><div style="flex:1" class="campo"><label>Status</label><select id="dp-st" onchange="document.getElementById('dp-ext').style.display=this.value==='pago'?'block':'none'"><option value="pendente"${v('status')==='pendente'?' selected':''}>⏳ Pendente</option><option value="pago"${v('status')==='pago'?' selected':''}>✓ Pago</option></select></div></div>
    <div id="dp-ext" style="${v('status')==='pago'?'':'display:none'}"><div class="campo"><label>Data Pagamento</label><input id="dp-dtpag" type="date" value="${v('dataPagamento',hoje())}"/></div></div>
    <div class="campo"><label>Observações</label><textarea id="dp-obs" rows="2">${v('obs')}</textarea></div>
    <div class="row" style="margin-top:14px;justify-content:flex-end">${B('Cancelar','FM()','var(--sur)','var(--txt)')}${B('💾 Salvar',`salvDesp('${id||''}')`, 'var(--acc)','#000')}</div>
  `);
}
function salvDesp(id){
  const imId=document.getElementById('dp-im').value, val=parseFloat(document.getElementById('dp-val').value)||0, venc=document.getElementById('dp-venc').value;
  if(!imId||!val||!venc){alert('Preencha: Imóvel, Valor e Vencimento.');return;}
  const st=document.getElementById('dp-st').value;
  const dtEl=document.getElementById('dp-dtpag');
  const obj={imovelId:imId,tipo:document.getElementById('dp-tp').value,descricao:document.getElementById('dp-desc').value.trim(),valor:val,vencimento:venc,dataPagamento:st==='pago'?(dtEl?dtEl.value||hoje():hoje()):'',contaId:document.getElementById('dp-cta').value,status:st,obs:document.getElementById('dp-obs').value.trim()};
  const n=JSON.parse(JSON.stringify(DB));
  if(id){const i=n.despesas.findIndex(x=>x.id===id);if(i>=0)n.despesas[i]={...n.despesas[i],...obj};}
  else n.despesas.push({id:uid(),...obj});
  FM(); salvar(n);
}
function modalPagarDesp(id){
  AM('✅ Pagar Despesa',`
    <div class="row"><div style="flex:1" class="campo"><label>Data do Pagamento</label><input id="pd-dt" type="date" value="${hoje()}"/></div><div style="flex:1" class="campo"><label>Conta</label><select id="pd-cta"><option value="">Selecione...</option>${DB.contas.map(c=>`<option value="${c.id}">${esc(c.nome)}</option>`).join('')}</select></div></div>
    <div class="row" style="margin-top:14px;justify-content:flex-end">${B('Cancelar','FM()','var(--sur)','var(--txt)')}${B('✅ Confirmar',`salvPagarDesp('${id}')`, 'var(--acc)','#000')}</div>
  `);
}
function salvPagarDesp(id){
  const dt=document.getElementById('pd-dt').value; if(!dt){alert('Informe a data.');return;}
  const n=JSON.parse(JSON.stringify(DB)); const i=n.despesas.findIndex(x=>x.id===id);
  if(i>=0)n.despesas[i]={...n.despesas[i],status:'pago',dataPagamento:dt,contaId:document.getElementById('pd-cta').value};

}
function remDesp(id){ ACF('Remover esta despesa?',()=>{const n=JSON.parse(JSON.stringify(DB));n.despesas=n.despesas.filter(x=>x.id!==id);salvar(n);}); }

// RELATÓRIOS
// ══════════════════════════════════════════
let _rlAno=new Date().getFullYear();
function htmlRL(){
  const ano=_rlAno; const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const recMes=meses.map((m,i)=>{const ref=`${ano}-${String(i+1).padStart(2,'0')}`;const pp=DB.pagamentos.filter(p=>p.referencia===ref);return {m,esp:pp.reduce((s,p)=>s+(p.valorPrevisto||0),0),rec:pp.filter(p=>p.status==='pago').reduce((s,p)=>s+(p.valorPago||p.valorPrevisto||0),0)};});
  const despMes=meses.map((m,i)=>{const ref=`${ano}-${String(i+1).padStart(2,'0')}`;const dd=DB.despesas.filter(d=>d.vencimento&&d.vencimento.startsWith(ref));return {m,tot:dd.reduce((s,d)=>s+(d.valor||0),0),pago:dd.filter(d=>d.status==='pago').reduce((s,d)=>s+(d.valor||0),0)};});
  const totEsp=recMes.reduce((s,x)=>s+x.esp,0), totRec=recMes.reduce((s,x)=>s+x.rec,0), totDesp=despMes.reduce((s,x)=>s+x.pago,0);
  const porIm=DB.imoveis.map(im=>{
    const pp=DB.pagamentos.filter(p=>p.imovelId===im.id&&p.referencia&&p.referencia.startsWith(String(ano)));
    const dd=DB.despesas.filter(d=>d.imovelId===im.id&&d.vencimento&&d.vencimento.startsWith(String(ano)));
    const esp=pp.reduce((s,p)=>s+(p.valorPrevisto||0),0), rec=pp.filter(p=>p.status==='pago').reduce((s,p)=>s+(p.valorPago||p.valorPrevisto||0),0);
    const dtot=dd.reduce((s,d)=>s+(d.valor||0),0), dpago=dd.filter(d=>d.status==='pago').reduce((s,d)=>s+(d.valor||0),0);
    return {im,esp,rec,dtot,dpago,liq:rec-dpago};
  });
  return `<div class="row" style="margin-bottom:14px;align-items:center">
    <div class="titulo acc" style="margin:0;flex:1">📈 Relatórios</div>
    <div class="row" style="gap:6px">
      <button type="button" onclick="_rlAno--;renderAba()" style="background:var(--sur);color:var(--txt);padding:5px 12px;border:1px solid var(--bor);border-radius:var(--r);cursor:pointer;font-weight:700">← ${ano-1}</button>
      <div style="font-weight:800;font-size:16px;padding:5px 16px;background:var(--card);border:1px solid var(--bor);border-radius:var(--r)">${ano}</div>
      <button type="button" onclick="_rlAno++;renderAba()" style="background:var(--sur);color:var(--txt);padding:5px 12px;border:1px solid var(--bor);border-radius:var(--r);cursor:pointer;font-weight:700">${ano+1} →</button>
    </div>
  </div>
  <div class="kpis" style="margin-bottom:14px">
    <div class="card kpi"><div class="kpi-l">Receita Esperada ${ano}</div><div class="kpi-v">${fmt(totEsp)}</div></div>
    <div class="card kpi"><div class="kpi-l">Receita Recebida ${ano}</div><div class="kpi-v" style="color:#3fb950">${fmt(totRec)}</div></div>
    <div class="card kpi"><div class="kpi-l">Despesas Pagas ${ano}</div><div class="kpi-v" style="color:var(--orn)">${fmt(totDesp)}</div></div>
    <div class="card kpi"><div class="kpi-l">Resultado Líquido</div><div class="kpi-v" style="color:${totRec-totDesp>=0?'#3fb950':'#f85149'}">${fmt(totRec-totDesp)}</div></div>
  </div>
  <div class="card" style="margin-bottom:14px">
    <div style="font-weight:700;margin-bottom:12px">📊 Receitas × Despesas por Mês — ${ano}</div>
    <table><thead><tr><th>Mês</th><th>Receita Esperada</th><th>Receita Recebida</th><th>Despesas</th><th>Resultado</th></tr></thead><tbody>
      ${recMes.map((rm,i)=>{const dm=despMes[i];const res=rm.rec-dm.pago;return `<tr><td style="font-weight:700">${rm.m}</td><td>${rm.esp>0?fmt(rm.esp):'—'}</td><td style="color:#3fb950">${rm.rec>0?fmt(rm.rec):'—'}</td><td style="color:var(--orn)">${dm.pago>0?fmt(dm.pago):'—'}</td><td style="font-weight:700;color:${res>0?'#3fb950':res<0?'#f85149':'var(--mut)'}">${rm.rec>0||dm.pago>0?fmt(res):'—'}</td></tr>`;}).join('')}
      <tr style="font-weight:700;background:var(--bg);border-top:2px solid var(--acc)"><td>TOTAL</td><td>${fmt(totEsp)}</td><td style="color:#3fb950">${fmt(totRec)}</td><td style="color:var(--orn)">${fmt(totDesp)}</td><td style="color:${totRec-totDesp>=0?'#3fb950':'#f85149'}">${fmt(totRec-totDesp)}</td></tr>
    </tbody></table>
  </div>
  <div class="card">
    <div style="font-weight:700;margin-bottom:12px">🏠 Por Imóvel — ${ano}</div>
    <table><thead><tr><th>Imóvel</th><th>Status</th><th>Receita Esperada</th><th>Receita Recebida</th><th>Despesas Pagas</th><th>Resultado Líquido</th></tr></thead><tbody>
      ${porIm.length===0?'<tr><td colspan="6" style="text-align:center;color:var(--mut)">Nenhum dado.</td></tr>':''}
      ${porIm.map(r=>`<tr><td style="font-weight:700">${esc(r.im.nome)}</td><td><span class="tag ${corSt(r.im.status)}">${lblSt(r.im.status)}</span></td><td>${r.esp>0?fmt(r.esp):'—'}</td><td style="color:#3fb950">${r.rec>0?fmt(r.rec):'—'}</td><td style="color:var(--orn)">${r.dpago>0?fmt(r.dpago):'—'}</td><td style="font-weight:700;color:${r.liq>0?'#3fb950':r.liq<0?'#f85149':'var(--mut)'}">${fmt(r.liq)}</td></tr>`).join('')}
    </tbody></table>
  </div>`;
}

// CADASTROS (CONTAS BANCÁRIAS)
// ══════════════════════════════════════════
function htmlCAD(){
  return `<div class="titulo acc">🏦 Cadastros</div>
  <div style="font-weight:700;font-size:14px;margin-bottom:12px">Contas Bancárias</div>
  <div class="row" style="align-items:center;margin-bottom:14px"><div style="flex:1;color:var(--mut);font-size:12px">${DB.contas.length} conta(s) cadastrada(s)</div>${B('+ Nova Conta','modalConta()','var(--acc)','#000')}</div>
  ${DB.contas.length===0?`<div class="card" style="text-align:center;padding:32px;color:var(--mut)">Nenhuma conta cadastrada.<br><small>Cadastre suas contas para identificar onde cada valor foi recebido ou pago.</small></div>`:''}
  <div style="display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:10px">
    ${DB.contas.map(c=>`<div class="card" style="display:flex;justify-content:space-between;align-items:center;gap:10px">
      <div><div style="font-weight:700">${esc(c.nome)}</div><div style="font-size:11px;color:var(--mut)">${esc(c.banco||'')}${c.tipo?' — '+esc(c.tipo):''}</div>${c.agencia?`<div style="font-size:11px;color:var(--mut)">Ag: ${esc(c.agencia)} · Cc: ${esc(c.conta||'')}</div>`:''}</div>
      <div class="row" style="gap:4px">${B('✏️',`modalConta('${c.id}')`, 'var(--sur)','var(--txt)','font-size:11px;padding:4px 8px')}${B('🗑',`remConta('${c.id}')`, 'var(--bg)','var(--red)','font-size:11px;padding:4px 8px;border:1px solid var(--bor)')}</div>
    </div>`).join('')}
  </div>`;
}
function modalConta(id){
  const c=id?DB.contas.find(x=>x.id===id):null;
  const v=(f,d='')=>c?esc(c[f]||d):d;
  AM(`${c?'✏️ Editar':'➕ Nova'} Conta`,`
    <div class="campo"><label>Nome da Conta *</label><input id="cc-nome" value="${v('nome')}" placeholder="Ex: Bradesco Corrente, PIX Caixa..."/></div>
    <div class="row"><div style="flex:1" class="campo"><label>Banco</label><input id="cc-banco" value="${v('banco')}"/></div><div style="flex:1" class="campo"><label>Tipo</label><select id="cc-tipo"><option value="corrente"${v('tipo')==='corrente'?' selected':''}>Conta Corrente</option><option value="poupanca"${v('tipo')==='poupanca'?' selected':''}>Poupança</option><option value="pix"${v('tipo')==='pix'?' selected':''}>PIX</option><option value="dinheiro"${v('tipo')==='dinheiro'?' selected':''}>Dinheiro/Caixa</option><option value="outro"${v('tipo')==='outro'?' selected':''}>Outro</option></select></div></div>
    <div class="row"><div style="flex:1" class="campo"><label>Agência</label><input id="cc-ag" value="${v('agencia')}" placeholder="0000"/></div><div style="flex:1" class="campo"><label>Conta</label><input id="cc-cc" value="${v('conta')}" placeholder="00000-0"/></div></div>
    <div class="row" style="margin-top:14px;justify-content:flex-end">${B('Cancelar','FM()','var(--sur)','var(--txt)')}${B('💾 Salvar',`salvConta('${id||''}')`, 'var(--acc)','#000')}</div>
  `);
}
function salvConta(id){
  const nome=document.getElementById('cc-nome').value.trim(); if(!nome){alert('Informe o nome.');return;}
  const obj={nome,banco:document.getElementById('cc-banco').value.trim(),tipo:document.getElementById('cc-tipo').value,agencia:document.getElementById('cc-ag').value.trim(),conta:document.getElementById('cc-cc').value.trim()};
  const n=JSON.parse(JSON.stringify(DB));
  if(id){const i=n.contas.findIndex(x=>x.id===id);if(i>=0)n.contas[i]={...n.contas[i],...obj};}
  else n.contas.push({id:uid(),...obj});
  FM(); salvar(n);
}
function remConta(id){
  const emUso=DB.pagamentos.some(p=>p.contaId===id)||DB.despesas.some(d=>d.contaId===id)||DB.contratos.some(c=>c.contaId===id);
  if(emUso){alert('Esta conta está em uso em pagamentos ou contratos. Não pode ser removida.');return;}
  ACF('Remover esta conta?',()=>{const n=JSON.parse(JSON.stringify(DB));n.contas=n.contas.filter(x=>x.id!==id);salvar(n);});
}

// AUTH & BOOT
// ══════════════════════════════════════════
async function entrar(){
  const t=document.getElementById('inp-token').value.trim(); if(!t){document.getElementById('err-token').style.display='block';return;}
  setToken(t); document.getElementById('err-token').style.display='none'; await init();
}
function desconectar(){ if(!confirm('Desconectar e trocar de token?'))return; localStorage.removeItem(AK+'_token'); location.reload(); }

async function init(){
  const loading=document.getElementById('tela-loading'), tokenTela=document.getElementById('tela-token');
  const navbar=document.getElementById('navbar'), main=document.getElementById('main');
  loading.style.display='flex'; tokenTela.style.display='none';
  if(!getToken()){loading.style.display='none';tokenTela.style.display='flex';return;}
  document.getElementById('load-msg').textContent='Conectando ao GitHub...';
  const dados=await ghCarregar();
  if(dados===null){ loading.style.display='none'; localStorage.removeItem(AK+'_token'); tokenTela.style.display='flex'; document.getElementById('err-token').style.display='block'; return; }
  DB=dados;
  if(!DB.imoveis)DB.imoveis=[];
  if(!DB.inquilinos)DB.inquilinos=[];
  if(!DB.contratos)DB.contratos=[];
  if(!DB.pagamentos)DB.pagamentos=[];
  if(!DB.despesas)DB.despesas=[];
  if(!DB.contas)DB.contas=[];
  loading.style.display='none'; navbar.style.display='flex'; main.style.display='block';
  if(!_shaAtual&&_sha)_shaAtual=_sha;
  renderAba(); iniciarSync();
}
init();
</script>

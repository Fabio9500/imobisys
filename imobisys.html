<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{--bg:#0d1117;--sur:#161b22;--card:#1c2433;--bor:#30363d;--acc:#4ade80;--grn:#2ea043;--red:#da3633;--blu:#58a6ff;--orn:#f0a500;--pur:#bc8cff;--txt:#e6edf3;--mut:#8b949e;--r:8px}
body{background:var(--bg);color:var(--txt);font-family:'Segoe UI',system-ui,sans-serif;font-size:13px}
::-webkit-scrollbar{width:5px;height:5px}::-webkit-scrollbar-thumb{background:var(--bor);border-radius:3px}
input,select,textarea{background:var(--bg);color:var(--txt);border:1px solid var(--bor);border-radius:var(--r);padding:7px 10px;font-size:13px;outline:none;width:100%;transition:border-color .2s;font-family:inherit}
input:focus,select:focus,textarea:focus{border-color:var(--acc)}
input::placeholder{color:var(--mut)}
input[type="date"],input[type="month"]{color-scheme:dark}
input[type="date"]::-webkit-calendar-picker-indicator,input[type="month"]::-webkit-calendar-picker-indicator{cursor:pointer;opacity:1;background-color:var(--acc);border-radius:4px;padding:3px}
button{cursor:pointer;font-weight:700;border:none;border-radius:var(--r);transition:opacity .15s;font-family:inherit}
button:hover{opacity:.85}
table{border-collapse:collapse;width:100%;font-size:12px}
th{text-align:left;padding:7px 10px;color:var(--txt);font-weight:800;border-bottom:2px solid var(--acc);font-size:11px;text-transform:uppercase;letter-spacing:.06em}
td{padding:7px 10px;border-bottom:1px solid #1e2530;vertical-align:middle}
tr:hover td{background:#1e2a3a22}
.card{background:var(--card);border:1px solid var(--bor);border-radius:var(--r);padding:16px}
.row{display:flex;gap:10px;flex-wrap:wrap;align-items:flex-start}
.tag{display:inline-block;padding:2px 8px;border-radius:20px;font-size:10px;font-weight:700;letter-spacing:.05em;white-space:nowrap}
.tag-am{background:#f0a50022;color:var(--orn);border:1px solid #f0a50055}
.tag-vd{background:#2ea04322;color:#3fb950;border:1px solid #2ea04355}
.tag-vm{background:#da363322;color:#f85149;border:1px solid #da363355}
.tag-az{background:#58a6ff22;color:var(--blu);border:1px solid #58a6ff55}
.tag-cz{background:#30363d33;color:var(--mut);border:1px solid var(--bor)}
.tag-vx{background:#4ade8022;color:var(--acc);border:1px solid #4ade8055}
.overlay{position:fixed;inset:0;background:#000a;z-index:999;display:none;align-items:center;justify-content:center;padding:12px}
.overlay.vis{display:flex}
.modal{background:var(--card);border:1px solid var(--bor);border-radius:12px;width:100%;max-width:680px;max-height:92vh;overflow-y:auto}
.modal-head{padding:13px 16px;border-bottom:1px solid var(--bor);display:flex;justify-content:space-between;align-items:center;font-weight:700;font-size:14px;position:sticky;top:0;background:var(--card);z-index:2}
.modal-body{padding:16px}
.campo{margin-bottom:10px}
.campo label{display:block;font-size:10px;color:var(--mut);margin-bottom:4px;font-weight:700;text-transform:uppercase;letter-spacing:.07em}
#navbar{background:var(--sur);border-bottom:1px solid var(--bor);padding:0 16px;display:flex;align-items:center;gap:10px;height:50px;position:sticky;top:0;z-index:100}
.logo{font-size:15px;font-weight:800;color:var(--acc);white-space:nowrap}
.tabs{display:flex;gap:3px;overflow-x:auto;flex:1;scrollbar-width:none}

.fab-back{background:var(--sur);color:var(--txt);border:1px solid var(--bor)}
.fab-tip{position:absolute;right:58px;background:#111;color:#fff;padding:4px 10px;border-radius:6px;font-size:11px;white-space:nowrap;opacity:0;pointer-events:none;transition:opacity .2s;top:50%;transform:translateY(-50%)}

@media print{#navbar,.noprint,#status,#fab-buttons{display:none!important}#main{padding:0;max-width:none}}

.login-card{background:var(--card);border:1px solid var(--bor);border-radius:14px;padding:28px;max-width:360px;width:100%;}

.login-block-imb{background:#4ade8022;border:1px solid var(--acc);border-radius:7px;padding:8px 12px;font-size:.78rem;color:var(--acc);text-align:center;margin-bottom:10px;display:none;line-height:1.5;}

@keyframes shake{0%,100%{transform:translateX(0)}20%,60%{transform:translateX(-8px)}40%,80%{transform:translateX(8px)}}

<script>
// ── AUTENTICAÇÃO ─────────────────────────────────────────────
// Senha compartilhada — sessão INDEPENDENTE por sistema
const AUTH_KEY   = 'app_auth_hash';
const AUTH_TS    = 'app_auth_ts_imb';
const AUTH_TRIES = 'app_auth_tries';
const AUTH_BLOCK = 'app_auth_block';
const AUTH_TIMEOUT   = 30 * 60 * 1000; // 30 min sem uso → pede senha novamente
const AUTH_BLOCK_MS  =  5 * 60 * 1000; // 5 min de bloqueio após 3 erros
const AUTH_MAX_TRIES = 3;

async function sha256(texto){
  const buf = await crypto.subtle.digest('SHA-256', new TextEncoder().encode(texto));
  return Array.from(new Uint8Array(buf)).map(b=>b.toString(16).padStart(2,'0')).join('');
}

function authValido(){
  const ts = parseInt(localStorage.getItem(AUTH_TS)||'0');
  return Date.now() - ts < AUTH_TIMEOUT;
}

function refreshAuth(){
  localStorage.setItem(AUTH_TS, Date.now().toString());
}

function mostrarLoginScreen(modoDefinir){
  document.getElementById('tela-loading').style.display = 'none';
  const tela  = document.getElementById('tela-login');
  const sub   = document.getElementById('login-sub-txt');
  const titulo= document.getElementById('login-titulo');
  const link  = document.getElementById('login-link-esqueceu');
  const btn   = document.getElementById('btn-login');
  if(modoDefinir){
    titulo.textContent = '🔑 Criar Senha';
    sub.textContent    = 'Defina uma senha para proteger este sistema.\nEla valerá também para Cartões PF, PJ e ChequeSys.';
    link.style.display = 'none';
    btn.textContent    = '✅ Definir senha';
    tela.dataset.modo  = 'definir';
  } else {
    titulo.textContent = 'Acesso Restrito';
    sub.textContent    = 'ImobiSys — Controle de Imóveis';
    link.style.display = 'block';
    btn.textContent    = '🔓 Entrar';
    tela.dataset.modo  = 'login';
  }
  tela.style.display = 'flex';
  setTimeout(()=>document.getElementById('login-senha').focus(), 120);
}

async function verificarSenha(){
  const senhaEl  = document.getElementById('login-senha');
  const erroEl   = document.getElementById('login-erro');
  const blockEl  = document.getElementById('login-block-info');
  const senha    = senhaEl.value.trim();
  erroEl.style.display  = 'none';
  blockEl.style.display = 'none';

  const blockUntil = parseInt(localStorage.getItem(AUTH_BLOCK)||'0');
  if(Date.now() < blockUntil){
    const min = Math.ceil((blockUntil - Date.now()) / 60000);
    blockEl.textContent   = `⛔ Muitas tentativas incorretas. Aguarde ${min} minuto(s).`;
    blockEl.style.display = 'block';
    return;
  }
  if(!senha){ erroEl.textContent='Digite a senha.'; erroEl.style.display='block'; return; }
  if(senha.length < 4){ erroEl.textContent='A senha deve ter pelo menos 4 caracteres.'; erroEl.style.display='block'; return; }

  const modo = document.getElementById('tela-login').dataset.modo;
  const hash = await sha256(senha);

  if(modo === 'definir'){
    localStorage.setItem(AUTH_KEY, hash);
    localStorage.removeItem(AUTH_TRIES);
    localStorage.removeItem(AUTH_BLOCK);
    refreshAuth();
    document.getElementById('tela-login').style.display = 'none';
    senhaEl.value = '';
    await initAposAuth();
    return;
  }

  const hashSalvo = localStorage.getItem(AUTH_KEY);
  if(hash === hashSalvo){
    localStorage.removeItem(AUTH_TRIES);
    localStorage.removeItem(AUTH_BLOCK);
    refreshAuth();
    document.getElementById('tela-login').style.display = 'none';
    senhaEl.value = '';
    await initAposAuth();
  } else {
    const tries = (parseInt(localStorage.getItem(AUTH_TRIES)||'0')) + 1;
    localStorage.setItem(AUTH_TRIES, tries.toString());
    const restam = AUTH_MAX_TRIES - tries;
    if(tries >= AUTH_MAX_TRIES){
      localStorage.setItem(AUTH_BLOCK, (Date.now() + AUTH_BLOCK_MS).toString());
      localStorage.removeItem(AUTH_TRIES);
      erroEl.textContent = '⛔ Senha incorreta. Sistema bloqueado por 5 minutos.';
    } else {
      erroEl.textContent = `❌ Senha incorreta. ${restam} tentativa(s) restante(s).`;
    }
    erroEl.style.display = 'block';
    senhaEl.classList.add('shake');
    senhaEl.addEventListener('animationend', ()=>senhaEl.classList.remove('shake'), {once:true});
    senhaEl.value = '';
    senhaEl.focus();
  }
}

function toggleSenhaVisivel(){
  const inp = document.getElementById('login-senha');
  const btn = document.getElementById('login-olho-btn');
  if(inp.type === 'password'){ inp.type = 'text'; btn.textContent = '🙈'; }
  else { inp.type = 'password'; btn.textContent = '👁'; }
}

function esqueceuSenha(){
  if(!confirm('Isso irá redefinir sua senha de acesso.\n\nSeus dados NÃO serão apagados.\n\nDeseja continuar?')) return;
  localStorage.removeItem(AUTH_KEY);
  localStorage.removeItem(AUTH_TRIES);
  localStorage.removeItem(AUTH_BLOCK);
  localStorage.removeItem(AUTH_TS);
  document.getElementById('login-erro').style.display       = 'none';
  document.getElementById('login-block-info').style.display = 'none';
  mostrarLoginScreen(true);
}

function bloquearManualmente(){
  localStorage.removeItem(AUTH_TS);
  location.reload();
}

async function verificarAuth(){
  const hashSalvo = localStorage.getItem(AUTH_KEY);
  if(!hashSalvo){ mostrarLoginScreen(true); return; }
  if(authValido()){ refreshAuth(); await initAposAuth(); return; }
  mostrarLoginScreen(false);
}

// ══════════════════════════════════════════
// CONFIG GITHUB
// ══════════════════════════════════════════
const GH_USER='Fabio9500', GH_REPO='imobisys', GH_FILE='dados.json';
const GH_API=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/${GH_FILE}`;
const AK='imobisys';
function getToken(){ return localStorage.getItem(AK+'_token')||''; }
function setToken(t){ localStorage.setItem(AK+'_token',t); }
let _sha=null, _shaAtual=null, _intervaloSync=null;
let DB={};

// ══════════════════════════════════════════
// OFFLINE / FILA
// ══════════════════════════════════════════
function getFila(){ try{return JSON.parse(localStorage.getItem(AK+'_fila')||'null');}catch(e){return null;} }
function setFila(db){ try{localStorage.setItem(AK+'_fila',JSON.stringify(db));}catch(e){} }
function limparFila(){ localStorage.removeItem(AK+'_fila'); }
function getUltimoSha(){ return localStorage.getItem(AK+'_last_sha')||''; }
function setUltimoSha(s){ if(s)localStorage.setItem(AK+'_last_sha',s); }
let _sincronizando=false;
function isOnline(){ return navigator.onLine; }

async function ghCarregar(){
  try{
    setStatus('saving','🔄 Carregando...');
    const r=await fetch(GH_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
    if(r.status===401||r.status===403) return null;
    if(r.status===404){ setStatus('ok','✅ Pronto'); return dbVazio(); }
    if(!r.ok) throw new Error('HTTP '+r.status);
    const j=await r.json();
    _sha=j.sha; setUltimoSha(j.sha); _shaAtual=j.sha;
    let dados;
    if(!j.content||j.content.trim()===''){
      const r2=await fetch(j.download_url); if(!r2.ok) throw new Error('Download falhou'); dados=await r2.json();
    } else { dados=JSON.parse(atob(j.content.replace(/\n/g,''))); }
    try{localStorage.setItem(AK+'_bkp',JSON.stringify(dados));}catch(e){}
    const fila=getFila();
    if(fila){ setStatus('warn','📤 Sincronizando alterações offline...'); return await resolverFila(fila,dados,j.sha); }
    setStatus('ok','✅ Dados carregados');
    setTimeout(()=>esconderStatus(),3000);
    return dados;
  }catch(e){
    const bkp=localStorage.getItem(AK+'_bkp');
    if(bkp){ setStatus('warn','📴 Offline — usando dados locais'); return JSON.parse(bkp); }
    setStatus('warn','⚠ Sem dados'); return dbVazio();
  }
}

async function resolverFila(filaDb,dadosRemotos,shaRemoto){
  const shaOld=getUltimoSha();
  if(!shaOld||shaOld===shaRemoto){
    limparFila(); await ghSalvar(filaDb);
    setStatus('ok','✅ Alterações offline sincronizadas');
    setTimeout(()=>esconderStatus(),4000);
    return filaDb;
  }
  mostrarConflitoSync(filaDb,dadosRemotos); return dadosRemotos;
}

function mostrarConflitoSync(filaDb,dadosRemotos){
  AM('⚠️ Conflito de Sincronização',`
    <div class="alerta av" style="margin-bottom:14px;font-size:13px">Você tem alterações offline que ainda não foram salvas na nuvem.<br>Porém, outro dispositivo já salvou dados diferentes. Escolha como prosseguir:</div>
    <div style="display:flex;flex-direction:column;gap:10px">
      ${B('☁️ Manter dados da nuvem (descarta alterações offline)','aplicarConflito(&quot;nuvem&quot;)','var(--blu)','#fff')}
      ${B('💾 Usar minhas alterações offline (sobrescreve nuvem)','aplicarConflito(&quot;local&quot;)','var(--acc)','#000')}
    </div>
    <div style="margin-top:12px;font-size:11px;color:var(--mut)">Dica: em dúvida escolha "nuvem" e refaça as alterações manualmente.</div>
  `);
  window._cFilaDb=filaDb; window._cRemoto=dadosRemotos;
}

async function aplicarConflito(op){
  FM();
  if(op==='nuvem'){ limparFila(); DB=window._cRemoto; setStatus('ok','☁️ Dados da nuvem mantidos'); }
  else { limparFila(); await ghSalvar(window._cFilaDb); DB=window._cFilaDb; setStatus('ok','✅ Alterações offline salvas'); }
  delete window._cFilaDb; delete window._cRemoto;
  renderAba(); setTimeout(()=>esconderStatus(),4000);
}

async function ghSalvar(db){
  try{localStorage.setItem(AK+'_bkp',JSON.stringify(db));}catch(e){}
  if(!isOnline()){ setFila(db); setStatus('warn','📴 Offline — alteração salva localmente'); setTimeout(()=>esconderStatus(),4000); return; }
  setStatus('saving','⏳ Salvando...');
  try{
    const rG=await fetch(GH_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
    if(rG.ok){ const jG=await rG.json(); _sha=jG.sha; _shaAtual=jG.sha; }
    const cont=btoa(unescape(encodeURIComponent(JSON.stringify(db,null,2))));
    const r=await fetch(GH_API,{method:'PUT',headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:'ImobiSys update',content:cont,sha:_sha})});
    const res=await r.json();
    if(res.content&&res.content.sha){ _sha=res.content.sha; _shaAtual=res.content.sha; setUltimoSha(res.content.sha); limparFila(); setStatus('ok','✅ Salvo'); }
    else { setFila(db); setStatus('err','⚠ Erro ao salvar — guardado localmente'); }
    setTimeout(()=>esconderStatus(),3000);
  }catch(e){ setFila(db); setStatus('warn','📴 Sem conexão — salvo localmente'); setTimeout(()=>esconderStatus(),5000); }
}

window.addEventListener('online',async()=>{
  const fila=getFila();

    _sincronizando=true;
    try{
      const r=await fetch(GH_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
      if(r.ok){ const j=await r.json(); const dr=JSON.parse(atob(j.content.replace(/\n/g,''))); await resolverFila(fila,dr,j.sha); if(!window._cFilaDb)renderAba(); }
    }catch(e){}
    _sincronizando=false;
  }
});

async function verificarSyncRemota(){
  if(!isOnline()||!getToken()) return;
  try{
    const r=await fetch(GH_API,{headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json'}});
    if(!r.ok) return;
    const j=await r.json();
    if(_shaAtual&&j.sha!==_shaAtual){
      _shaAtual=j.sha; _sha=j.sha; setUltimoSha(j.sha);
      let dados; if(!j.content||j.content.trim()===''){ const r2=await fetch(j.download_url); dados=await r2.json(); } else { dados=JSON.parse(atob(j.content.replace(/\n/g,''))); }

}

async function backupGH(silencioso){
  if(!getToken()||!isOnline()) return false;
  try{
    const ts=new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
    const url=`https://api.github.com/repos/${GH_USER}/${GH_REPO}/contents/backups/backup_${ts}.json`;
    const cont=btoa(unescape(encodeURIComponent(JSON.stringify(DB,null,2))));
    const r=await fetch(url,{method:'PUT',headers:{'Authorization':`token ${getToken()}`,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},body:JSON.stringify({message:`Backup ${ts}`,content:cont})});
    if(r.ok){ try{localStorage.setItem(AK+'_ult_bkp',new Date().toLocaleString('pt-BR'));}catch(e){} if(!silencioso){setStatus('ok','☁️ Backup salvo no GitHub!');setTimeout(()=>esconderStatus(),4000);} return true; }
  }catch(e){}
  if(!silencioso){setStatus('err','⚠ Erro ao fazer backup');setTimeout(()=>esconderStatus(),4000);}
  return false;
}
function backupLocal(){
  const ts=new Date().toISOString().slice(0,16).replace('T','_').replace(/:/g,'-');
  const nome=`ImobiSys_backup_${ts}.json`;
  const blob=new Blob([JSON.stringify(DB,null,2)],{type:'application/json'});
  const a=document.createElement('a'); a.href=URL.createObjectURL(blob); a.download=nome; a.click();
  URL.revokeObjectURL(a.href);
  try{localStorage.setItem(AK+'_ult_bkp',new Date().toLocaleString('pt-BR'));}catch(e){}
  setStatus('ok',`💾 ${nome}`); setTimeout(()=>esconderStatus(),4000);
}
async function backupCompleto(){
  setStatus('saving','⏳ Fazendo backup completo...');
  const ghOk=await backupGH(true); backupLocal();
  setStatus(ghOk?'ok':'warn',ghOk?'✅ Backup concluído — GitHub + local':'💾 Backup local (GitHub indisponível)');
  setTimeout(()=>esconderStatus(),5000);
}
function importarBackup(file){
  if(!file) return;
  const reader=new FileReader();
  reader.onload=async(e)=>{
    try{
      const d=JSON.parse(e.target.result);
      if(!d.imoveis||!d.inquilinos){alert('Arquivo inválido.');return;}
      ACF('Importar backup substituirá todos os dados atuais. Confirmar?',async()=>{ DB=d; await ghSalvar(DB); renderAba(); setStatus('ok','✅ Backup importado'); });
    }catch(e){alert('Erro ao ler arquivo: '+e.message);}
  };
  reader.readAsText(file);
}

function htmlDB(){
  const total=DB.imoveis.length, alugados=DB.imoveis.filter(i=>i.status==='alugado').length, vagos=DB.imoveis.filter(i=>i.status==='vago').length;
  const {esp,rec}=receitaMes(); const atr=calcAtrasados(); const datr=calcDespAtrasadas();
  const totalAtr=atr.reduce((s,p)=>s+(p.valorPrevisto||0),0);

  // Alertas de aluguéis atrasados agrupados por inquilino
  let alertas='';
  if(atr.length>0){
    const porIq={};
    atr.forEach(p=>{if(!porIq[p.inquilinoId])porIq[p.inquilinoId]=[];porIq[p.inquilinoId].push(p);});
    Object.entries(porIq).forEach(([iqId,pags])=>{
      const inq=DB.inquilinos.find(x=>x.id===iqId); const im=DB.imoveis.find(x=>x.id===pags[0].imovelId);
      const tot=pags.reduce((s,p)=>s+(p.valorPrevisto||0),0); const mx=Math.max(...pags.map(p=>diasAtraso(p.vencimento)));
      alertas+=`<div class="alerta av" style="display:flex;align-items:center;gap:10px;flex-wrap:wrap">
        <div style="flex:1">⚠ <strong>${esc(inq?inq.nome:'?')}</strong>${im?' — '+esc(im.nome):''} — ${pags.length} parcela(s) — ${fmt(tot)} — ${mx} dia(s)</div>
        ${inq&&inq.whatsapp?B('💬 WhatsApp',`abrirWppInquilino('${iqId}')`, '#25d366','#fff','padding:5px 10px;font-size:11px'):''}
      </div>`;
    });
  }

  // Despesas vencendo em até 7 dias
  const h7=new Date(); h7.setDate(h7.getDate()+7);
  DB.despesas.filter(d=>d.status!=='pago'&&diasAtraso(d.vencimento)<=0&&new Date(d.vencimento+'T00:00:00')<=h7).forEach(d=>{
    const im=DB.imoveis.find(x=>x.id===d.imovelId); const da=diasAtraso(d.vencimento);
    alertas+=`<div class="alerta aa">📅 Despesa vencendo: <strong>${esc(d.tipo.toUpperCase())}</strong> — ${im?esc(im.nome):''} — ${fmt(d.valor)} — Venc. ${fmtData(d.vencimento)}${da<0?' (em '+(da*-1)+' dias)':' (HOJE)'}</div>`;
  });
  if(datr.length>0) alertas+=`<div class="alerta av">⚠ ${datr.length} despesa(s) em atraso — total ${fmt(datr.reduce((s,d)=>s+(d.valor||0),0))}</div>`;

  // Contratos vencendo em 60 dias
  const h60=new Date(); h60.setDate(h60.getDate()+60); const h0=new Date(); h0.setHours(0,0,0,0);
  DB.contratos.filter(c=>c.status==='ativo'&&c.dataFim).forEach(c=>{
    const fim=new Date(c.dataFim+'T00:00:00');
    if(fim>=h0&&fim<=h60){
      const im=DB.imoveis.find(x=>x.id===c.imovelId); const inq=DB.inquilinos.find(x=>x.id===c.inquilinoId);
      const dias=Math.ceil((fim-h0)/86400000);
      alertas+=`<div class="alerta aa">📋 Contrato vencendo em <strong>${dias} dias</strong>: ${im?esc(im.nome):''} — ${inq?esc(inq.nome):''} — Fim: ${fmtData(c.dataFim)}</div>`;
    }
  });
  if(!alertas) alertas='<div class="alerta ag">✅ Tudo em dia — nenhum alerta no momento!</div>';

  const ultPags=[...DB.pagamentos].sort((a,b)=>(b.dataPagamento||b.vencimento)<(a.dataPagamento||a.vencimento)?-1:1).slice(0,6);

  return `<div class="titulo acc">📊 Dashboard</div>
  <div class="kpis">
    <div class="card kpi"><div class="kpi-l">Total de Imóveis</div><div class="kpi-v">${total}</div><div class="kpi-s">${alugados} alugado${alugados!==1?'s':''}, ${vagos} vago${vagos!==1?'s':''}</div></div>
    <div class="card kpi"><div class="kpi-l">Receita Esperada (mês)</div><div class="kpi-v" style="color:var(--acc)">${fmt(esp)}</div><div class="kpi-s">${fmtMes(mesAtual())}</div></div>
    <div class="card kpi"><div class="kpi-l">Recebido no Mês</div><div class="kpi-v" style="color:#3fb950">${fmt(rec)}</div><div class="kpi-s">${fmt(esp-rec)} pendente</div></div>
    <div class="card kpi"><div class="kpi-l">Total em Atraso</div><div class="kpi-v" style="color:${totalAtr>0?'#f85149':'var(--mut)'}">${fmt(totalAtr)}</div><div class="kpi-s">${atr.length} parcela(s)</div></div>
    <div class="card kpi"><div class="kpi-l">Contratos Ativos</div><div class="kpi-v">${DB.contratos.filter(c=>c.status==='ativo').length}</div><div class="kpi-s">de ${DB.contratos.length} total</div></div>
  </div>
  <div style="margin-bottom:16px"><div style="font-weight:700;margin-bottom:10px">🔔 Alertas</div>${alertas}</div>
  ${htmlCalendario()}
  <div class="row" style="gap:16px;align-items:flex-start">
    <div style="flex:1;min-width:260px"><div class="card">
      <div style="font-weight:700;margin-bottom:12px;font-size:13px">🏠 Situação dos Imóveis</div>
      ${DB.imoveis.length===0?'<div style="color:var(--mut);font-size:12px">Nenhum imóvel cadastrado.</div>':''}
      ${DB.imoveis.map(im=>{const ct=ctAtivo(im.id);const inq=ct?DB.inquilinos.find(x=>x.id===ct.inquilinoId):null;return `<div style="padding:8px 0;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:8px"><div style="flex:1"><div style="font-weight:700;font-size:12px">${esc(im.nome)}</div><div style="font-size:11px;color:var(--mut)">${inq?esc(inq.nome):'Sem inquilino'}${ct?' — '+fmt(ct.valorAluguel)+'/mês':''}</div></div><span class="tag ${corSt(im.status)}">${lblSt(im.status)}</span></div>`;}).join('')}
    </div></div>
    <div style="flex:1;min-width:260px"><div class="card">
      <div style="font-weight:700;margin-bottom:12px;font-size:13px">💰 Últimos Lançamentos</div>
      ${ultPags.length===0?'<div style="color:var(--mut);font-size:12px">Nenhum pagamento registrado.</div>':''}
      ${ultPags.map(p=>{const im=DB.imoveis.find(x=>x.id===p.imovelId);const st=stPag(p);return `<div style="padding:8px 0;border-bottom:1px solid var(--bor);display:flex;align-items:center;gap:8px"><div style="flex:1"><div style="font-weight:700;font-size:12px">${im?esc(im.nome):'?'} — ${fmtMes(p.referencia)}</div><div style="font-size:11px;color:var(--mut)">${fmt(p.valorPrevisto)} — Venc. ${fmtData(p.vencimento)}</div></div><span class="tag ${corSt(st)}">${lblSt(st)}</span></div>`;}).join('')}
    </div></div>
  </div>`;
}

function salvImovel(id){

function gerarCobrancas(ctId){
  const ct=DB.contratos.find(x=>x.id===ctId); if(!ct)return;
  const im=DB.imoveis.find(x=>x.id===ct.imovelId);
  AM('📅 Gerar Cobranças',`
    <div style="font-size:13px;margin-bottom:14px">Imóvel: <strong>${im?esc(im.nome):''}</strong> — ${fmt(ct.valorAluguel)}/mês</div>

    <div class="campo"><label>Valor (deixe em branco para usar valor do contrato)</label><input id="gc-val" type="number" step="0.01" placeholder="${fmtN(ct.valorAluguel)}"/></div>
    <div class="row" style="margin-top:14px;justify-content:flex-end">${B('Cancelar','FM()','var(--sur)','var(--txt)')}${B('📅 Gerar',`execGerarCobrancas('${ctId}')`, 'var(--acc)','#000')}</div>
  `);
}
function execGerarCobrancas(ctId){
  const ct=DB.contratos.find(x=>x.id===ctId); if(!ct)return;
  const mesBase=document.getElementById('gc-mes').value;
  const qtd=parseInt(document.getElementById('gc-qtd').value)||1;
  const valCust=parseFloat(document.getElementById('gc-val').value)||0;
  const val=valCust||ct.valorAluguel;
  const novo=JSON.parse(JSON.stringify(DB));
  let gerados=0, ignorados=0;
  for(let i=0;i<qtd;i++){
    const [a,m]=mesBase.split('-').map(Number);
    const d=new Date(a,m-1+i,1);
    const ref=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    if(novo.pagamentos.some(p=>p.contratoId===ctId&&p.referencia===ref)){ignorados++;continue;}
    const dia=String(ct.diaVencimento).padStart(2,'0');
    const venc=`${ref}-${dia}`;
    novo.pagamentos.push({id:uid(),contratoId:ctId,imovelId:ct.imovelId,inquilinoId:ct.inquilinoId,referencia:ref,vencimento:venc,valorPrevisto:val,valorPago:0,dataPagamento:'',contaId:ct.contaId,status:'pendente',obs:''});
    gerados++;
  }
  FM(); salvar(novo);
  setStatus('ok',`✅ ${gerados} cobrança(s) gerada(s)${ignorados>0?`, ${ignorados} já existia(m)`:''}`);
  setTimeout(()=>esconderStatus(),4000);
}
function verPagsCt(ctId){
  const pags=DB.pagamentos.filter(p=>p.contratoId===ctId).sort((a,b)=>a.referencia>b.referencia?1:-1);
  const ct=DB.contratos.find(x=>x.id===ctId); const im=DB.imoveis.find(x=>x.id===ct?.imovelId);
  AM(`💰 Pagamentos — ${im?esc(im.nome):''}`,`<table><thead><tr><th>Referência</th><th>Vencimento</th><th>Valor</th><th>Pago em</th><th>Vlr Pago</th><th>Status</th></tr></thead><tbody>${pags.length===0?'<tr><td colspan="6" style="text-align:center;color:var(--mut)">Nenhum pagamento.</td></tr>':''}${pags.map(p=>{const st=stPag(p);return `<tr><td>${fmtMes(p.referencia)}</td><td>${fmtData(p.vencimento)}</td><td>${fmt(p.valorPrevisto)}</td><td>${p.dataPagamento?fmtData(p.dataPagamento):'—'}</td><td>${p.valorPago?fmt(p.valorPago):'—'}</td><td><span class="tag ${corSt(st)}">${lblSt(st)}</span></td></tr>`;}).join('')}</tbody></table>`);
}

function htmlRLDRE(){
  const ano=_rlAno; const meses=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'];
  const linhas=meses.map((m,i)=>{
    const ref=`${ano}-${String(i+1).padStart(2,'0')}`;
    const rec=DB.pagamentos.filter(p=>p.referencia===ref&&p.status==='pago').reduce((s,p)=>s+(p.valorPago||p.valorPrevisto||0),0);
    const desp=DB.despesas.filter(d=>d.vencimento&&d.vencimento.startsWith(ref)&&d.status==='pago').reduce((s,d)=>s+(d.valor||0),0);
    const iptu=DB.despesas.filter(d=>d.vencimento&&d.vencimento.startsWith(ref)&&d.tipo==='iptu'&&d.status==='pago').reduce((s,d)=>s+(d.valor||0),0);
    const manut=DB.despesas.filter(d=>d.vencimento&&d.vencimento.startsWith(ref)&&['manutenção','reforma'].includes(d.tipo)&&d.status==='pago').reduce((s,d)=>s+(d.valor||0),0);
    const outros=desp-iptu-manut;
    return {m,rec,iptu,manut,outros,liq:rec-desp};
  });
  const tot={rec:linhas.reduce((s,l)=>s+l.rec,0),iptu:linhas.reduce((s,l)=>s+l.iptu,0),manut:linhas.reduce((s,l)=>s+l.manut,0),outros:linhas.reduce((s,l)=>s+l.outros,0)};

  </div>
  <div class="kpis" style="margin-bottom:14px">
    <div class="card kpi"><div class="kpi-l">Receita Total</div><div class="kpi-v" style="color:#3fb950">${fmt(tot.rec)}</div></div>
    <div class="card kpi"><div class="kpi-l">(-) IPTU</div><div class="kpi-v" style="color:var(--orn)">${fmt(tot.iptu)}</div></div>
    <div class="card kpi"><div class="kpi-l">(-) Manutenções</div><div class="kpi-v" style="color:var(--orn)">${fmt(tot.manut)}</div></div>
    <div class="card kpi"><div class="kpi-l">(-) Outras Despesas</div><div class="kpi-v" style="color:var(--orn)">${fmt(tot.outros)}</div></div>

  </div>

// ── PROJEÇÃO 12 MESES ────────────────────
function htmlRLProjecao(){
  const agora=new Date(); const anoAtual=agora.getFullYear(); const mesAtualN=agora.getMonth();
  const projecao=[];
  for(let i=1;i<=12;i++){
    const d=new Date(anoAtual,mesAtualN+i,1);
    const ref=`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
    const cts=DB.contratos.filter(c=>c.status==='ativo');
    const recEsp=cts.reduce((s,c)=>s+(c.valorAluguel||0),0);
    const despPrev=DB.despesas.filter(dp=>dp.vencimento&&dp.vencimento.startsWith(ref)).reduce((s,d)=>s+(d.valor||0),0);
    const nome=['Jan','Fev','Mar','Abr','Mai','Jun','Jul','Ago','Set','Out','Nov','Dez'][d.getMonth()]+'/'+d.getFullYear();
    projecao.push({nome,ref,recEsp,despPrev,liqEsp:recEsp-despPrev});
  }
  const totRec=projecao.reduce((s,p)=>s+p.recEsp,0);
  const totDesp=projecao.reduce((s,p)=>s+p.despPrev,0);
  return `<div style="font-weight:700;font-size:14px;margin-bottom:14px">🔮 Projeção de Receita — Próximos 12 Meses</div>
  <div class="alerta ai" style="margin-bottom:14px">Projeção baseada nos contratos ativos atuais. Despesas já lançadas para o período são incluídas automaticamente.</div>

    <div class="card kpi"><div class="kpi-l">Resultado Projetado (12m)</div><div class="kpi-v" style="color:${totRec-totDesp>=0?'#3fb950':'#f85149'}">${fmt(totRec-totDesp)}</div></div>

  <div class="card"><table><thead><tr><th>Mês</th><th>Receita Esperada</th><th>Despesas Previstas</th><th>Resultado Projetado</th></tr></thead><tbody>
    ${projecao.map(p=>`<tr><td style="font-weight:700">${p.nome}</td><td style="color:#3fb950">${fmt(p.recEsp)}</td><td style="color:var(--orn)">${p.despPrev>0?fmt(p.despPrev):'—'}</td><td style="font-weight:700;color:${p.liqEsp>=0?'#3fb950':'#f85149'}">${fmt(p.liqEsp)}</td></tr>`).join('')}

}

function htmlCalendario(){
  const hoje2=new Date();const ano=hoje2.getFullYear();const mes=hoje2.getMonth();
  const nomeMes=['Janeiro','Fevereiro','Março','Abril','Maio','Junho','Julho','Agosto','Setembro','Outubro','Novembro','Dezembro'][mes];

  const dias7=['D','S','T','Q','Q','S','S'];const hd=hoje2.getDate();
  const evs={};
  DB.pagamentos.forEach(p=>{if(!p.vencimento)return;const d=new Date(p.vencimento+'T00:00:00');if(d.getFullYear()===ano&&d.getMonth()===mes){const dia=d.getDate();if(!evs[dia])evs[dia]=[];const st=stPag(p);evs[dia].push({cor:st==='pago'?'#2ea043':st==='atrasado'?'#da3633':'#f0a500',tip:'💰 '+nomeIm(p.imovelId)});}});
  DB.despesas.forEach(d=>{if(!d.vencimento)return;const dt=new Date(d.vencimento+'T00:00:00');if(dt.getFullYear()===ano&&dt.getMonth()===mes){const dia=dt.getDate();if(!evs[dia])evs[dia]=[];const st=stDesp(d);evs[dia].push({cor:st==='pago'?'#2ea043':st==='atrasado'?'#da3633':'#58a6ff',tip:'🧾 '+nomeIm(d.imovelId)});}});
  DB.seguros.forEach(s=>{if(!s.vencimento)return;const dt=new Date(s.vencimento+'T00:00:00');if(dt.getFullYear()===ano&&dt.getMonth()===mes){const dia=dt.getDate();if(!evs[dia])evs[dia]=[];evs[dia].push({cor:'#bc8cff',tip:'🔒 Seguro '+nomeIm(s.imovelId)});}});
  DB.manutencoes.forEach(m=>{if(!m.proxima_data)return;const dt=new Date(m.proxima_data+'T00:00:00');if(dt.getFullYear()===ano&&dt.getMonth()===mes){const dia=dt.getDate();if(!evs[dia])evs[dia]=[];evs[dia].push({cor:'#f0a500',tip:'🔧 '+m.tipo+' '+nomeIm(m.imovelId)});}});
  let cal=`<div class="card" style="margin-bottom:14px">
    <div style="font-weight:700;margin-bottom:10px;display:flex;align-items:center">📅 ${nomeMes} ${ano}<div style="flex:1"></div>

        <span>🟢 Pago</span><span style="color:var(--orn)">🟡 Vence</span><span style="color:#f85149">🔴 Atraso</span><span style="color:var(--blu)">🔵 Despesa</span><span style="color:#bc8cff">🟣 Seguro</span>
      </div>
    </div>
    <div style="display:grid;grid-template-columns:repeat(7,1fr);gap:2px">
      ${dias7.map(d=>`<div style="text-align:center;font-size:10px;font-weight:700;color:var(--mut);padding:3px 0">${d}</div>`).join('')}
      ${Array(primeiroDia).fill('<div></div>').join('')}
      ${Array.from({length:diasNoMes},(_,i)=>{const dia=i+1;const e=evs[dia]||[];const isH=dia===hd;
        const dots=e.slice(0,4).map(ev=>`<span style="display:inline-block;width:5px;height:5px;background:${ev.cor};border-radius:50%;margin:0 1px" title="${ev.tip}"></span>`).join('');
        return `<div style="text-align:center;padding:4px 1px;border-radius:5px;background:${isH?'var(--acc)':'transparent'}">
          <div style="font-size:11px;font-weight:${isH?'800':'400'};color:${isH?'#000':'var(--txt)'}">${dia}</div>
          <div style="min-height:10px;display:flex;justify-content:center;flex-wrap:wrap">${dots}</div>
        </div>`;}).join('')}
    </div>
  </div>`;
  return cal;
}

// PIX — GERADOR COPIA E COLA
// ══════════════════════════════════════════
function gerarPixPayload(chave,valor,nome,cidade){
  const v=parseFloat(valor).toFixed(2);
  const n=(nome||'Fabio O Santos').substring(0,25).trim().toUpperCase();
  const c=(cidade||'ITABUNA').substring(0,15).trim().toUpperCase();
  const gui='0014BR.GOV.BCB.PIX'+String(chave.length).padStart(2,'0')+chave;
  const addData='050***';
  const payload='000201'+'2'+String(gui.length+2).padStart(2,'0')+gui+'52040000'+'5303986'+'54'+String(v.length).padStart(2,'0')+v+'5802BR'+'59'+String(n.length).padStart(2,'0')+n+'60'+String(c.length).padStart(2,'0')+c+'62'+String(addData.length+2).padStart(2,'0')+addData+'6304';
  let crc=0xFFFF;
  for(let i=0;i<payload.length;i++){crc^=payload.charCodeAt(i)<<8;for(let j=0;j<8;j++)crc=(crc&0x8000)?(crc<<1)^0x1021:crc<<1;}
  return payload+(crc&0xFFFF).toString(16).toUpperCase().padStart(4,'0');
}

const BCB_INDICES={IGPM:189,IPCA:433,INPC:188};

async function modalReajuste(ctId){
  const ct=DB.contratos.find(x=>x.id===ctId);if(!ct)return;

    <div class="campo"><label>Índice de Reajuste</label>
      <select id="raj-indice"><option value="IGPM">IGP-M (FGV)</option><option value="IPCA">IPCA (IBGE)</option><option value="INPC">INPC (IBGE)</option><option value="manual">Percentual Manual</option></select>
    </div>

      ${B('Cancelar','FM()','var(--sur)','var(--txt)')}
      ${B('🔍 Buscar Índice','calcReajuste(\''+ctId+'\')','var(--blu)','#fff')}
    </div>
  `);
  document.getElementById('raj-indice').addEventListener('change',function(){document.getElementById('raj-manual-campo').style.display=this.value==='manual'?'':'none';});
}

async function calcReajuste(ctId){
  const ct=DB.contratos.find(x=>x.id===ctId);if(!ct)return;
  const indice=document.getElementById('raj-indice').value;
  const resPainel=document.getElementById('raj-resultado');
  resPainel.innerHTML='<div style="color:var(--mut);font-size:12px">⏳ Buscando índice no Banco Central...</div>';
  let pct=0;
  if(indice==='manual'){
    pct=parseFloat(document.getElementById('raj-manual').value)||0;
  } else {
    try{
      const cod=BCB_INDICES[indice];
      const r=await fetch(`https://api.bcb.gov.br/dados/serie/bcdata.sgs.${cod}/dados/ultimos/12?formato=json`);
      if(!r.ok)throw new Error('API indisponível');
      const dados=await r.json();
      if(!dados.length)throw new Error('Sem dados');
      pct=dados.reduce((acc,d)=>acc*(1+(parseFloat(d.valor)||0)/100),1)-1;
      pct=pct*100;
    }catch(e){
      resPainel.innerHTML=`<div class="alerta av">Não foi possível buscar o índice automaticamente. Use "Percentual Manual".</div>`;return;
    }
  }
  const novoValor=ct.valorAluguel*(1+pct/100);
  const diff=novoValor-ct.valorAluguel;
  resPainel.innerHTML=`<div class="card" style="margin:0">
    <div class="row" style="justify-content:space-between;flex-wrap:wrap;gap:10px">
      <div><div style="font-size:11px;color:var(--mut)">Índice Acumulado (12m)</div><div style="font-size:18px;font-weight:800;color:var(--acc)">${pct.toFixed(2)}%</div></div>
      <div><div style="font-size:11px;color:var(--mut)">Valor Atual</div><div style="font-size:16px;font-weight:700">${fmt(ct.valorAluguel)}</div></div>
      <div><div style="font-size:11px;color:var(--mut)">Reajuste</div><div style="font-size:16px;font-weight:700;color:var(--orn)">+ ${fmt(diff)}</div></div>
      <div><div style="font-size:11px;color:var(--mut)">Novo Valor</div><div style="font-size:18px;font-weight:800;color:#3fb950">${fmt(novoValor)}</div></div>
    </div>
    <div style="margin-top:12px"><label style="font-size:10px;color:var(--mut);text-transform:uppercase;font-weight:700">Data de Vigência do Reajuste</label><input id="raj-vigencia" type="date" value="${hoje()}" style="margin-top:4px"/></div>
    <div class="row" style="margin-top:12px;gap:8px">
      ${B('✅ Aplicar Reajuste',`aplicarReajuste('${ctId}','${novoValor.toFixed(2)}')`, 'var(--acc)','#000')}
      ${B('💬 Notificar WhatsApp',`notifReajusteWpp('${ctId}','${novoValor.toFixed(2)}')`, '#25d366','#fff')}
    </div>
  </div>`;
}

function aplicarReajuste(ctId,novoValorStr){
  const novoValor=parseFloat(novoValorStr);
  ACF(`Aplicar reajuste de aluguel para <strong>${fmt(novoValor)}</strong>? O valor do contrato será atualizado.`,()=>{
    const n=JSON.parse(JSON.stringify(DB));const i=n.contratos.findIndex(x=>x.id===ctId);
    if(i>=0)n.contratos[i].valorAluguel=novoValor;
    FM();salvar(n);setStatus('ok','✅ Reajuste aplicado com sucesso!');setTimeout(()=>esconderStatus(),4000);
  },'✅ Confirmar Reajuste');
}

function notifReajusteWpp(ctId,novoValorStr){
  const ct=DB.contratos.find(x=>x.id===ctId);if(!ct)return;
  const iq=DB.inquilinos.find(x=>x.id===ct.inquilinoId);if(!iq||!iq.whatsapp){alert('Inquilino sem WhatsApp.');return;}

  const vigencia=vigEl?fmtData(vigEl.value):fmtData(hoje());
  const msg=`Olá ${iq.nome}! 😊\n\nInformamos que o aluguel do imóvel *${im?im.nome:''}* passará por reajuste anual, conforme previsto em contrato.\n\n📋 Índice aplicado: ${ct.reajuste||'IGP-M'}\n💰 Valor atual: ${fmt(ct.valorAluguel)}\n💰 Novo valor: *${fmt(novoValor)}*\n📅 Vigência a partir de: ${vigencia}\n\nQuaisquer dúvidas estamos à disposição.\n\nAtenciosamente,\nFabio Santos`;
  abrirWpp(iq.whatsapp,msg);
}

function removerDesconto(ctId,idx){

function atualizarDesconto(ctId,idx,campo,val){

function gerarItensChecklist(imovel){
  const isComercial=(imovel.categoria==='comercial')||['Comercial','Sala','Galpão'].includes(imovel.tipo);
  const isMob=(imovel.mobiliado==='mobiliado'||imovel.mobiliado==='semi');
  let base=isComercial?[...CL_COM]:[...CL_RES];
  if(isMob) base=base.concat(isComercial?CL_COM_MOB:CL_RES_MOB);
  const itens=[];
  base.forEach(sec=>sec.itens.forEach(item=>itens.push({cat:sec.cat,item,estado:'',obs:''})));
  return itens;
}

function processarFoto(vsId,file){
  if(!file)return;
  const reader=new FileReader();
  reader.onload=e=>{
    const img=new Image();
    img.onload=()=>{
      const maxW=900,maxH=900;
      let w=img.width,h=img.height;
      if(w>maxW||h>maxH){const r=Math.min(maxW/w,maxH/h);w=Math.round(w*r);h=Math.round(h*r);}
      const cv=document.createElement('canvas');cv.width=w;cv.height=h;
      cv.getContext('2d').drawImage(img,0,0,w,h);
      const data=cv.toDataURL('image/jpeg',0.65);
      const nome=prompt('Nome desta foto (ex: Sala - Parede Norte):','Foto '+(((DB.vistorias.find(x=>x.id===vsId)||{}).fotos||[]).length+1));
      const n=JSON.parse(JSON.stringify(DB));
      const vs=n.vistorias.find(x=>x.id===vsId);
      if(!vs)return;
      if(!vs.fotos)vs.fotos=[];
      vs.fotos.push({id:uid(),nome:nome||'Sem nome',data});
      DB=n; ghSalvar(DB); renderAba();
    };
    img.src=e.target.result;
  };
  reader.readAsDataURL(file);
}
function removerFoto(vsId,fotoId){
  const n=JSON.parse(JSON.stringify(DB));
  const vs=n.vistorias.find(x=>x.id===vsId);
  if(!vs)return;
  vs.fotos=(vs.fotos||[]).filter(f=>f.id!==fotoId);
  DB=n; ghSalvar(DB); renderAba();
}

function initCanvasAssin(){
  const cv=document.getElementById('cvs-assin'); if(!cv)return;
  const ctx=cv.getContext('2d'); ctx.strokeStyle='#111'; ctx.lineWidth=2.5; ctx.lineCap='round'; ctx.lineJoin='round';
  let dn=false;
  function pos(e){const r=cv.getBoundingClientRect();const sx=cv.width/r.width,sy=cv.height/r.height;const t=e.touches?e.touches[0]:e;return{x:(t.clientX-r.left)*sx,y:(t.clientY-r.top)*sy};}
  function ini(e){e.preventDefault();dn=true;const p=pos(e);ctx.beginPath();ctx.moveTo(p.x,p.y);}
  function draw(e){e.preventDefault();if(!dn)return;const p=pos(e);ctx.lineTo(p.x,p.y);ctx.stroke();}
  function fim(e){e.preventDefault();dn=false;}
  cv.addEventListener('mousedown',ini);cv.addEventListener('mousemove',draw);cv.addEventListener('mouseup',fim);cv.addEventListener('mouseleave',fim);
  cv.addEventListener('touchstart',ini,{passive:false});cv.addEventListener('touchmove',draw,{passive:false});cv.addEventListener('touchend',fim,{passive:false});
}
function limparCanvasAssin(){const cv=document.getElementById('cvs-assin');if(cv)cv.getContext('2d').clearRect(0,0,cv.width,cv.height);}

function numExtenso(v){
  const n=parseFloat(v)||0,r=Math.round(n*100),reais=Math.floor(r/100),cents=r%100;
  const un=['zero','um','dois','três','quatro','cinco','seis','sete','oito','nove','dez','onze','doze','treze','quatorze','quinze','dezesseis','dezessete','dezoito','dezenove'];
  const dz=['','','vinte','trinta','quarenta','cinquenta','sessenta','setenta','oitenta','noventa'];
  const ce=['','cem','duzentos','trezentos','quatrocentos','quinhentos','seiscentos','setecentos','oitocentos','novecentos'];
  function p2(n){if(n<20)return un[n];if(n%10===0)return dz[Math.floor(n/10)];return dz[Math.floor(n/10)]+' e '+un[n%10];}
  function p3(n){if(n===100)return 'cem';if(n>100)return ce[Math.floor(n/100)]+(n%100?' e '+p2(n%100):'');return p2(n);}
  let s='';
  if(reais>=1000){s=p3(Math.floor(reais/1000))+' mil';if(reais%1000)s+=' e '+p3(reais%1000);}
  else if(reais>0)s=p3(reais);else s='zero';
  s+=' reai'+(reais===1?'l':'s');
  if(cents>0)s+=' e '+p2(cents)+' centavo'+(cents===1?'':'s');
  return s.charAt(0).toUpperCase()+s.slice(1);
}
function numExtensoMeses(n){return {1:'um',2:'dois',3:'três',4:'quatro',6:'seis',12:'doze',18:'dezoito',24:'vinte e quatro',30:'trinta',36:'trinta e seis'}[n]||String(n);}
function numExtensoDia(n){return {1:'primeiro',2:'segundo',5:'quinto',10:'décimo',15:'décimo quinto',20:'vigésimo',25:'vigésimo quinto',28:'vigésimo oitavo',30:'trigésimo'}[n]||String(n)+'º';}

async function entrar(){
  const t=document.getElementById('inp-token').value.trim(); if(!t){document.getElementById('err-token').style.display='block';return;}
  setToken(t); document.getElementById('err-token').style.display='none'; await initAposAuth();
}
function desconectar(){ if(!confirm('Desconectar e trocar de token?'))return; localStorage.removeItem(AK+'_token'); location.reload(); }

async function initAposAuth(){
  const loading=document.getElementById('tela-loading'), tokenTela=document.getElementById('tela-token');
  const navbar=document.getElementById('navbar'), main=document.getElementById('main');
  loading.style.display='flex'; tokenTela.style.display='none';

  // Sem token — precisa conectar pela primeira vez
  if(!getToken()){
    loading.style.display='none'; tokenTela.style.display='flex';
    if(!isOnline()){
      const el=document.getElementById('err-token');
      el.textContent='📴 Sem internet. Conecte-se à internet na primeira vez para salvar o token.';
      el.style.display='block';
    }
    return;
  }

  // ── OFFLINE: carrega direto do cache local, sem tentar o GitHub ──
  if(!isOnline()){
    const bkp=localStorage.getItem(AK+'_bkp');
    if(bkp){
      try{
        const dados=JSON.parse(bkp);
        if(dados){
          DB=dados;
          if(!DB.imoveis)DB.imoveis=[];
          if(!DB.inquilinos)DB.inquilinos=[];
          if(!DB.contratos)DB.contratos=[];
          if(!DB.pagamentos)DB.pagamentos=[];
          if(!DB.despesas)DB.despesas=[];
          if(!DB.contas)DB.contas=[];
          if(!DB.vistorias)DB.vistorias=[];
          loading.style.display='none'; navbar.style.display='flex'; main.style.display='block';
          if(!_shaAtual&&_sha)_shaAtual=_sha;
          renderAba(); iniciarSync();
          setStatus('warn','📴 Modo offline — dados do último acesso');
          setTimeout(()=>esconderStatus(),5000);
          mostrarBotaoIOSSeNecessario();
          return;
        }
      }catch(e){}
    }
    // Sem cache local
    loading.style.display='none'; tokenTela.style.display='flex';
    const el=document.getElementById('err-token');
    el.textContent='📴 Sem internet e sem dados em cache. Conecte-se à internet para carregar o sistema pela primeira vez.';
    el.style.display='block';
    return;
  }

  // ── ONLINE: fluxo normal ──
  document.getElementById('load-msg').textContent='Conectando ao GitHub...';
  const dados=await ghCarregar();
  if(dados===null){ loading.style.display='none'; localStorage.removeItem(AK+'_token'); tokenTela.style.display='flex'; document.getElementById('err-token').style.display='block'; return; }
  DB=dados;
  if(!DB.imoveis)DB.imoveis=[];
  if(!DB.inquilinos)DB.inquilinos=[];
  if(!DB.contratos)DB.contratos=[];
  if(!DB.pagamentos)DB.pagamentos=[];
  if(!DB.despesas)DB.despesas=[];
  if(!DB.contas)DB.contas=[];
  if(!DB.vistorias)DB.vistorias=[];
  if(!DB.seguros)DB.seguros=[];
  if(!DB.chaves)DB.chaves=[];
  if(!DB.manutencoes)DB.manutencoes=[];
  loading.style.display='none'; navbar.style.display='flex'; main.style.display='block';
  if(!_shaAtual&&_sha)_shaAtual=_sha;
  renderAba(); iniciarSync();
  mostrarBotaoIOSSeNecessario();
}

      </div>
    </div>
    <div style="margin-top:14px;padding:10px 14px;background:#4ade8022;border:1px solid #4ade8055;border-radius:8px;font-size:12px;color:var(--acc)">
      ✅ Após instalado, o ImobiSys abre diretamente sem o Safari e funciona offline!
    </div>
    <div style="margin-top:10px">${B('✅ Entendido, vou instalar!','FM()','var(--acc)','#000','width:100%;padding:10px')}</div>
  `);
}

// ══════════════════════════════════════════
// PWA — SERVICE WORKER + INSTALAÇÃO
// ══════════════════════════════════════════
let _swReg=null, _deferredInstall=null;

function registrarSW(){
  if(!('serviceWorker' in navigator)) return;
  navigator.serviceWorker.register('./sw.js',{scope:'./'})
    .then(reg=>{
      _swReg=reg;
      reg.addEventListener('updatefound',()=>{
        const nSW=reg.installing;
        nSW.addEventListener('statechange',()=>{
          if(nSW.state==='installed'&&navigator.serviceWorker.controller) mostrarAtualizacao();
        });
      });
    })
    .catch(err=>console.warn('[ImobiSys] SW não registrado:',err));
  navigator.serviceWorker.addEventListener('controllerchange',()=>location.reload());
}

function mostrarAtualizacao(){
  const el=document.createElement('div');
  el.style.cssText='position:fixed;top:58px;left:50%;transform:translateX(-50%);background:var(--acc);color:#000;padding:10px 18px;border-radius:20px;font-size:12px;font-weight:700;z-index:9999;cursor:pointer;box-shadow:0 4px 12px #0006;white-space:nowrap';
  el.innerHTML='🔄 Nova versão disponível — toque para atualizar';
  el.onclick=()=>{ if(_swReg&&_swReg.waiting)_swReg.waiting.postMessage('SKIP_WAITING'); el.remove(); };
  document.body.appendChild(el); setTimeout(()=>el.remove(),8000);
}

window.addEventListener('beforeinstallprompt',e=>{
  e.preventDefault(); _deferredInstall=e;
  const btn=document.createElement('button');
  btn.type='button'; btn.id='btn-instalar'; btn.innerHTML='📲 Instalar App';
  btn.style.cssText='background:var(--acc);color:#000;border:none;border-radius:6px;padding:5px 11px;font-size:11px;font-weight:700;cursor:pointer;font-family:inherit;white-space:nowrap';
  btn.onclick=instalarApp;
  const nb=document.getElementById('navbar'); if(nb)nb.appendChild(btn);
});

function instalarApp(){
  if(!_deferredInstall) return;
  _deferredInstall.prompt();
  _deferredInstall.userChoice.then(r=>{
    if(r.outcome==='accepted'){ setStatus('ok','✅ ImobiSys instalado!'); setTimeout(()=>esconderStatus(),4000); const b=document.getElementById('btn-instalar'); if(b)b.remove(); }
    _deferredInstall=null;
  });
}
window.addEventListener('appinstalled',()=>{ setStatus('ok','🏠 ImobiSys instalado na tela inicial!'); setTimeout(()=>esconderStatus(),5000); });
window.addEventListener('load',registrarSW);

verificarAuth();
</script>
